<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request IT Support - NextGrid Technologies</title>
<meta name="description" content="Request IT support from NextGrid Technologies. Get help with Microsoft 365, security, and managed IT services.">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="header"></div>

<section class="contact-page" style="padding: 80px 20px;">
  <div class="container" style="max-width: 600px; margin: 0 auto;">
    <div class="signin-component">
      <h2 style="text-align: center; margin-bottom: 8px;">Request IT Support</h2>
      <p class="contact-subtext" style="text-align: center;">Tell us what you need — we’ll reply fast.</p>
      <form class="user-form" data-mode="create">
        <input type="text" name="full_name" placeholder="Your Full Name" required>
        <input type="text" name="company" placeholder="Company Name" required>
        <input type="email" name="email" placeholder="Business Email" required>
        <input type="tel" name="phone_number" placeholder="Phone Number" required>
        <input type="text" name="address" placeholder="Business Address" required>
        <textarea name="service_request" placeholder="What kind of service/request are you looking for?" required></textarea>
        <input type="password" name="password" placeholder="Create Password" required minlength="8">
        <input type="password" name="password_confirm" placeholder="Confirm Password" required minlength="8">
        <button type="submit" class="btn-primary">Send Request</button>
        <p class="form-message" style="margin-top:12px;"></p>
      </form>
      <p style="text-align: center; margin-top: 20px; font-size: 14px;">
        Already have an account? <a href="login.html" style="color: var(--accent-1);">Sign In Here</a>
      </p>
    </div>
  </div>
</section>

<div class="bottom-nav">
<a href="index.html"><span>🏠</span><p>Home</p></a>
<a href="services.html"><span>🛠</span><p>Services</p></a>
<a href="blog.html"><span>📰</span><p>Blog</p></a>
<a href="contact.html"><span>📞</span><p>Contact</p></a>
</div>

<footer>
<div class="container">
<p>© 2026 NextGrid Technologies</p>
</div>
</footer>

<script src="js/supabase.min.js"></script>
<script>
    const supabaseClient = supabase.createClient(
        'https://tirkqybcedxfusifslim.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8',
        { auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true } }
    );

    // Load header
    fetch('header.html')
      .then(res => res.text())
      .then(async (data) => {
        document.getElementById('header').innerHTML = data;
        
        document.getElementById('hamburger')?.addEventListener('click', () => {
          document.getElementById('navMenu')?.classList.toggle('active');
        });
        
        const scrollBtn = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', () => {
          if (window.scrollY > 300) {
            scrollBtn?.classList.add('show');
          } else {
            scrollBtn?.classList.remove('show');
          }
        });
        
        scrollBtn?.addEventListener('click', () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Auth state
        const { data: { user } } = await supabaseClient.auth.getUser();
        const adminLinkContainer = document.getElementById('adminLinkContainer');
        const loginLogoutLink = document.getElementById('loginLogoutLink');
        const authNavWrapper = document.getElementById('authNavWrapper');

        if (user && loginLogoutLink) {
            loginLogoutLink.textContent = 'Logout';
            loginLogoutLink.href = '#';
            loginLogoutLink.onclick = async (e) => {
                e.preventDefault();
                await supabaseClient.auth.signOut();
                window.location.href = 'login.html';
            };

            if (adminLinkContainer) {
              const { data: profileData } = await supabaseClient
                 .from('profiles')
                 .select('role')
                 .eq('user_id::uuid', user.id)
                 .single();

              if (profileData && profileData.role === 'admin') {
                  adminLinkContainer.innerHTML = '<a href="admin_dashboard.html" class="nav-cta">Admin Panel</a>';
              }
            }
        } else if (loginLogoutLink) {
            loginLogoutLink.textContent = 'Client Login';
            loginLogoutLink.href = 'login.html';
        }

        if (authNavWrapper) authNavWrapper.classList.remove('nav-hidden');
      });

    // Form handler
    document.querySelector('.user-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const messageEl = document.querySelector('.form-message');
      const formData = Object.fromEntries(new FormData(e.target).entries());
      
      if (formData.password !== formData.password_confirm) {
        messageEl.textContent = 'Passwords do not match';
        messageEl.style.color = 'red';
        return;
      }
      if (formData.password.length < 8) {
        messageEl.textContent = 'Password must be at least 8 characters';
        messageEl.style.color = 'red';
        return;
      }
      
      delete formData.password_confirm;
      
      if (formData.service_request) {
        formData.service_request = formData.service_request;
        delete formData.service_request;
      }

      messageEl.textContent = 'Creating account...';
      messageEl.style.color = 'orange';

      try {
        const { data: authData, error: authError } = await supabaseClient.auth.signUp({ 
          email: formData.email, 
          password: formData.password 
        });
        if (authError) throw authError;
        
         const { error: profileError } = await supabaseClient
            .from('profiles')
            .upsert({
              user_id: authData.user.id,
              full_name: formData.full_name,
              company: formData.company,
              email: formData.email,
              phone_number: formData.phone_number,
              address: formData.address,
              service_request: formData.information,
              role: 'client'
            }, { onConflict: 'user_id' }); // This tells Supabase to update if user_id exists
          if (profileError) throw profileError;
        
        messageEl.textContent = 'Success! Check your email to confirm, then log in.';
        messageEl.style.color = 'green';
        e.target.reset();
        
      } catch (err) {
        messageEl.textContent = err.message || 'Error saving data';
        messageEl.style.color = 'red';
      }
    });
</script>
  
</body>
</html>
