<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Login | NextGrid Technologies</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<section id="login" class="contact-wrapper" style="max-width:420px;margin:80px auto;text-align:center;">
  <h2>Client Login</h2>
  <p class="contact-subtext">Access your account</p>

  <form id="loginForm" class="contact-form">
    <input type="email" id="email" placeholder="Business Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit" class="btn-primary">Sign In</button>
    <p id="message" style="margin-top:12px;"></p>
    <p style="margin-top:10px;font-size:14px;">
      Don’t have an account? <a href="index.html#contact">Request access</a>
    </p>
  </form>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient = supabase.createClient(
  'https://tirkqybcedxfusifslim.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8'
)

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const email = document.getElementById('email').value
  const password = document.getElementById('password').value
  const msg = document.getElementById('message')

  msg.textContent = 'Signing in...'
  msg.style.color = 'inherit'

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password })

  if (error) {
    msg.textContent = error.message
    msg.style.color = 'red'
  } else {
    msg.textContent = 'Success! Redirecting…'
    msg.style.color = 'green'
    window.location.href = 'account.html'
  }
})
</script>
</body>
</html>
