<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | NextGrid Technologies</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"> <!-- Link to your main stylesheet -->
</head>
<body>

<section id="reset-password" class="contact-wrapper" style="max-width:420px;margin:80px auto;text-align:center;">
  <h2>Reset Your Password</h2>
  <p class="contact-subtext">Enter your new password below.</p>

  <form id="resetPasswordForm" class="contact-form">
    <input type="password" id="password" placeholder="New Password" required minlength="6">
    <input type="password" id="confirmPassword" placeholder="Confirm New Password" required minlength="6">
    
    <button type="submit" class="btn-primary">Set New Password</button>
    <p id="message" class="message-text"></p> <!-- Message area -->
  </form>

  <p style="margin-top:20px;font-size:14px;">
    Remember your password? <a href="login.html">Sign In</a>
  </p>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient = supabase.createClient(
  'https://tirkqybcedxfusifslim.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8'
);

document.addEventListener('DOMContentLoaded', () => {
  const hash = window.location.hash;
  // Supabase automatically handles the session when redirecting after password reset click
  // We just need to check if a user is currently signed in.
  // This helps ensure the session is active for the password update.
  supabaseClient.auth.getSession().then(({ data: { session } }) => {
    if (!session && hash.includes('access_token')) {
      // If no session but access_token is present,
      // it means the user clicked the reset link and Supabase should handle the session implicitly.
      // We don't need to manually parse and set the token here,
      // as the subsequent updateUser call will use the active session.
      console.log('User arrived via reset link, session should be handled by Supabase.');
    } else if (!session) {
      // If no session and no access_token, user might have landed here directly.
      document.getElementById('message').textContent = 'Invalid password reset link or session expired. Please request a new password reset.';
      document.getElementById('message').classList.add('error');
      document.getElementById('resetPasswordForm').style.display = 'none'; // Hide the form
    }
  });
});

document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const msg = document.getElementById('message');

  msg.textContent = ''; // Clear previous messages
  msg.className = 'message-text'; // Reset classes

  if (password !== confirmPassword) {
    msg.textContent = 'Passwords do not match.';
    msg.classList.add('error');
    return;
  }

  if (password.length < 6) {
    msg.textContent = 'Password must be at least 6 characters long.';
    msg.classList.add('error');
    return;
  }

  msg.textContent = 'Setting new password...';
  msg.classList.add('warning');

  // Supabase updates the user's password using the current session (which would be active if they clicked the reset link)
  const { error } = await supabaseClient.auth.updateUser({
    password: password
  });

  if (error) {
    msg.textContent = error.message;
    msg.classList.remove('warning', 'success');
    msg.classList.add('error');
  } else {
    msg.textContent = 'Your password has been reset successfully! Redirecting to login...';
    msg.classList.remove('warning', 'error');
    msg.classList.add('success');
    // After successful reset, redirect to the login page
    setTimeout(() => {
      window.location.href = 'login.html';
    }, 3000); // Redirect after 3 seconds
  }
});
</script>
</body>
</html>
