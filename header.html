<header>
  <div class="container header-flex">
    <div class="logo-area">
      <img src="favicon.ico" alt="NextGrid Technologies Logo" class="logo">
      <a href="index.html" class="logo-text">
        <span class="logo-line-1">NextGrid</span>
        <span class="logo-line-2">Technologies</span>
      </a>
    </div>

    <nav id="navMenu">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="blog.html">Blog</a>
      <!-- Admin link populates here if user is admin -->
      <div id="adminLinkContainer"></div>
      <!-- Login/Logout Link -->
      <a href="login.html" class="nav-cta" id="loginLogoutLink">Client Login</a>
    </nav>

    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">☰</button>
  </div>

  <!-- Floating Action Buttons -->
  <div class="fab-container">
    <a href="tel:+27680330794" class="fab fab-phone" aria-label="Call us">📞</a>
    <a href="https://wa.me/27680330794" target="_blank" class="fab fab-whatsapp" aria-label="WhatsApp us">💬</a>
    <button class="fab fab-top" id="scrollTopBtn" aria-label="Back to top">↑</button>
  </div>
</header>

<script>
(async function initHeader() {
    // Wait for supabase to be available
    if (typeof supabase === 'undefined') return;
    
    const supabaseClient = supabase.createClient(
        'https://tirkqybcedxfusifslim.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8'
    );

    // Hamburger toggle
    document.getElementById('hamburger')?.addEventListener('click', () => {
        document.getElementById('navMenu')?.classList.toggle('active');
    });

    // Scroll to top button
    document.getElementById('scrollTopBtn')?.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Auth check
    const { data: { user } } = await supabaseClient.auth.getUser();
    const adminLinkContainer = document.getElementById('adminLinkContainer');
    const loginLogoutLink = document.getElementById('loginLogoutLink');

    if (user && loginLogoutLink) {
        // User is logged in - change to Sign Out
        loginLogoutLink.textContent = 'Sign Out';
        loginLogoutLink.href = '#';
        loginLogoutLink.onclick = async (e) => {
            e.preventDefault();
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        };

        // Check if admin and show Admin Portal
        if (adminLinkContainer) {
            const { data: profileData } = await supabaseClient
                .from('profiles')
                .select('role')
                .eq('user_id', user.id)
                .single();

            if (profileData && profileData.role === 'admin') {
                adminLinkContainer.innerHTML = '<a href="admin_dashboard.html">Admin Portal</a>';
            }
        }
    } else if (loginLogoutLink) {
        // Not logged in
        loginLogoutLink.textContent = 'Client Login';
        loginLogoutLink.href = 'login.html';
    }
})();
</script>
