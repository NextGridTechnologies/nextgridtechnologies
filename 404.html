
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | NextGrid Technologies</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
    }
    h1 {
      font-size: 6rem;
      margin: 0;
      color: #38bdf8;
    }
    h2 {
      margin: 10px 0 20px;
      font-weight: 400;
    }
    p {
      color: #94a3b8;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      background: #38bdf8;
      color: #0f172a;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s;
    }
    a:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Sorry, we can't find that page. It might have been moved or deleted, or maybe you mistyped the URL.</p>
    <a href="/">Back to NextGrid Home</a>
  </div>
</body>
</html>
