<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Account - NextGrid Technologies</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="account.css"> <!-- New stylesheet for this page -->
</head>
<body>

<header>
  <div class="container header-flex">
    <div class="logo-area">
      <img src="favicon.ico" alt="NextGrid Technologies Logo" class="logo">
      <a href="index.html" class="logo-text">NextGrid Technologies</a>
    </div>
    <nav id="navMenu">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
    </nav>
  </div>
</header>

<div class="container">
    <div class="account-form-container">
        <div class="form-toggle">
            <button id="showLoginBtn" class="toggle-btn active">Login</button>
            <button id="showSignupBtn" class="toggle-btn">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="account-form active">
            <h2>Client Login</h2>
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" required>
            </div>
            <button type="submit" class="btn-primary">Login</button>
        </form>

        <!-- Sign Up Form -->
        <form id="signupForm" class="account-form">
            <h2>Create Your Account</h2>
            <div class="form-group">
                <label for="signup-name">Full Name</label>
                <input type="text" id="signup-name" placeholder="e.g., Jane Doe" required>
            </div>
             <div class="form-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="signup-company">Company Name (Optional)</label>
                <input type="text" id="signup-company" placeholder="e.g., Acme Inc.">
            </div>
             <div class="form-group">
                <label for="signup-phone">Phone Number (Optional)</label>
                <input type="tel" id="signup-phone" placeholder="e.g., +27 12 345 6789">
            </div>
            <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
        </form>
        
        <div id="message" class="message"></div>

    </div>
</div>

<script src="js/supabase.min.js"></script>
<script>
    const supabaseClient = supabase.createClient(
        'https://tirkqybcedxfusifslim.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8'
    );

    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const showLoginBtn = document.getElementById('showLoginBtn');
    const showSignupBtn = document.getElementById('showSignupBtn');
    const messageDiv = document.getElementById('message');

    // --- UI Toggle Logic ---
    showLoginBtn.addEventListener('click', () => {
        loginForm.classList.add('active');
        signupForm.classList.remove('active');
        showLoginBtn.classList.add('active');
        showSignupBtn.classList.remove('active');
    });

    showSignupBtn.addEventListener('click', () => {
        signupForm.classList.add('active');
        loginForm.classList.remove('active');
        showSignupBtn.classList.add('active');
        showLoginBtn.classList.remove('active');
    });

    function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = `message ${type}`;
    }

    // --- Login Handler ---
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        showMessage('Logging in...', 'info');

        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
            showMessage(error.message, 'error');
            return;
        }

        // On successful login, check role and redirect
        const { data: profile, error: profileError } = await supabaseClient
            .from('profiles')
            .select('role')
            .eq('user_id', data.user.id)
            .single();

        if (profileError || !profile) {
            showMessage('Could not find user profile. Please contact support.', 'error');
            await supabaseClient.auth.signOut(); // Log them out to be safe
        } else if (profile.role === 'admin') {
            window.location.href = 'admin_dashboard.html';
        } else {
            window.location.href = 'client_dashboard.html';
        }
    });

    // --- Sign Up Handler (Updated) ---
    signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;
        const fullName = document.getElementById('signup-name').value;
        const company = document.getElementById('signup-company').value;
        const phone = document.getElementById('signup-phone').value;

        showMessage('Creating your account...', 'info');

        // Step 1: Create the user in the auth system
        const { data: authData, error: authError } = await supabaseClient.auth.signUp({
            email,
            password,
        });

        if (authError) {
            showMessage(authError.message, 'error');
            return;
        }

        if (!authData.user) {
            showMessage('Account created, but you must verify your email before logging in.', 'success');
            return;
        }
        
        // Step 2: Insert the user's details into the 'profiles' table
        const { error: profileError } = await supabaseClient
            .from('profiles')
            .insert({
                user_id: authData.user.id, // Link to the new auth user
                full_name: fullName,
                email: email, // Store email here as well for easy access
                company: company,
                phone_number: phone,
                role: 'client' // ** IMPORTANT: Set default role for new sign-ups **
            });

        if (profileError) {
            // This is a critical error. The auth user was created but the profile failed.
            // You might want to add more robust error handling here, like deleting the auth user.
            showMessage(`Account created, but failed to save profile: ${profileError.message}`, 'error');
            return;
        }

        showMessage('Account successfully created! You can now log in.', 'success');
        
        // Optional: switch to the login form after successful sign-up
        loginForm.classList.add('active');
        signupForm.classList.remove('active');
        showLoginBtn.classList.add('active');
        showSignupBtn.classList.remove('active');
        document.getElementById('login-email').value = email; // Pre-fill email
    });
</script>

</body>
</html>
