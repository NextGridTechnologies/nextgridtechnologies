<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Account</title>

    <!-- CRITICAL: Make sure this path is correct for your file structure. -->
    <!-- If styles.css is in the root, use "/styles.css" -->
    <!-- If it's in a subfolder, use "/css/styles.css" -->
    <link rel="stylesheet" href="/styles.css">
    
    <script src="/js/supabase.min.js"></script>

    <!-- NEW: A special style block to guarantee content is hidden before JS runs -->
    <style>
      #account-content { display: none; }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <section class="hero" id="loading-section">
        <div class="hero-content">
            <h1>Verifying Session...</h1>
        </div>
    </section>

    <!-- Main Account Content -->
    <!-- It now starts hidden because of the <style> block above -->
    <div id="account-content" style="padding: 40px 20px; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="account-wrapper">
            <h2>Your Account Dashboard</h2>
            <div class="account-info">
                <p>Welcome! You are successfully logged in. Your user details are below.</p>
                <pre id="user-info"></pre>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                 <button id="signOutButton" class="btn btn-secondary">Sign Out</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const supabaseClient = supabase.createClient(
                'https://tirkqybcedxfusifslim.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8'
            );

            const accountContent = document.getElementById('account-content');
            const loadingSection = document.getElementById('loading-section');
            const userInfo = document.getElementById('user-info');
            const signOutButton = document.getElementById('signOutButton');

            signOutButton.addEventListener('click', async () => {
                await supabaseClient.auth.signOut();
                window.location.href = '/login.html';
            });

            async function checkSession() {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    loadingSection.style.display = 'none';
                    accountContent.style.display = 'flex'; // Use flex to center it
                    userInfo.textContent = JSON.stringify(session.user, null, 2);
                } else {
                    window.location.href = '/login.html';
                }
            }
            
            checkSession();
        });
    </script>

</body>
</html>
