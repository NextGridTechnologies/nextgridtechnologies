
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bare Minimum Supabase Sign-In</title>
    <!-- Include the Supabase JS Library -->
    <script src="js/supabase.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        form { display: flex; flex-direction: column; gap: 10px; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .message { margin-top: 15px; font-weight: bold; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>

    <h1>Supabase Sign-In Test</h1>

    <form id="loginForm">
        <label for="email">Email:</label>
        <input type="email" id="email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" required>

        <button type="submit">Sign In</button>
    </form>

    <p id="message" class="message"></p>

    <script>
        // 1. Initialize the Supabase Client
        const supabaseClient = supabase.createClient(
            'https://tirkqybcedxfusifslim.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8'
        );

        // 2. Get references to the HTML elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const messageDiv = document.getElementById('message');

        // 3. Add an event listener to the form
        loginForm.addEventListener('submit', async (e) => {
            // Prevent the form from refreshing the page
            e.preventDefault();

            // Get the email and password from the form
            const email = emailInput.value;
            const password = passwordInput.value;

            // Display a "loading" message
            messageDiv.textContent = 'Attempting to sign in...';
            messageDiv.className = 'message';

            // 4. Call the Supabase signInWithPassword function
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            // 5. Check the result and display a message
            if (error) {
                // If there was an error, display the error message
                messageDiv.textContent = `Login Failed: ${error.message}`;
                messageDiv.className = 'message error';
            } else {
                // If login was successful, display a success message
                messageDiv.textContent = 'Success! You are signed in.';
                messageDiv.className = 'message success';
                console.log('Successful sign-in data:', data);
            }
        });
    </script>

</body>
</html>
