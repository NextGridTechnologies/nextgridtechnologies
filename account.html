    <body>

        <h1>Bare Minimum Logout Test</h1>
        <p id="status">Status: Initializing...</p>
        <button id="logoutButton">Logout</button>

        <script>
            // Supabase client initialization - VERIFY THESE ARE 100% CORRECT
            const supabaseClient = supabase.createClient(
                'https://tirkqybcedxfusifslim.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8',
                { auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true } }
            );

            const statusParagraph = document.getElementById('status');
            const logoutButton = document.getElementById('logoutButton');

            // Initial check for session
            supabaseClient.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    statusParagraph.textContent = `Status: Logged in as ${session.user.email}`;
                    logoutButton.style.display = 'block';
                } else {
                    statusParagraph.textContent = 'Status: Not logged in.';
                    logoutButton.style.display = 'none';
                    window.location.replace('login.html'); // Redirect if not logged in
                }
            }).catch(e => {
                console.error("Error getting session:", e);
                statusParagraph.textContent = `Status: Error getting session: ${e.message}`;
            });

            logoutButton.addEventListener('click', async () => {
                statusParagraph.textContent = 'Status: Attempting to log out...';
                console.log('Logout button clicked - attempting signOut...');

                try {
                    const { error } = await supabaseClient.auth.signOut();
                    if (error) {
                        console.error('Error signing out:', error.message);
                        statusParagraph.textContent = `Status: Error signing out: ${error.message}`;
                        alert('Error signing out: ' + error.message);
                    } else {
                        console.log('Sign out successful.');
                        statusParagraph.textContent = 'Status: Logged out successfully!';
                        // The onAuthStateChange listener would normally handle redirection,
                        // but since this is bare minimum, we'll force it after success.
                        window.location.replace('login.html');
                    }
                } catch (e) {
                    console.error('An unexpected error occurred during signOut:', e);
                    statusParagraph.textContent = `Status: Unexpected error: ${e.message}`;
                }
            });

            // Keep the onAuthStateChange listener for completeness, but it's not the primary focus here
            supabaseClient.auth.onAuthStateChange((event, session) => {
                console.log('onAuthStateChange fired in bare minimum test:', event, session);
                if (event === 'SIGNED_OUT') {
                    console.log('SIGNED_OUT event detected. Redirecting.');
                    window.location.replace('login.html');
                }
            });
        </script>
    </body>
    </html>
