<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Account - NextGrid Technologies</title>

    <!-- ✅ KEEPING YOUR LOCAL FILE -->
    <script src="js/supabase.min.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <div class="container header-flex">
        <div class="logo-area">
            <img src="favicon.ico" class="logo">
            <a href="index.html" class="logo-text">NextGrid Technologies</a>
        </div>

        <nav id="navMenu">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="blog.html">Blog</a>
            <div id="adminLinkContainer"></div>
            <a href="login.html" class="nav-cta" id="loginLogoutLink">Client Login</a>
        </nav>

        <button class="hamburger" id="hamburger">&#9776;</button>
    </div>
</header>

<section id="main-account-dashboard" class="contact-wrapper account-wrapper">
    <div class="dashboard-content">

        <h1>Welcome to your Client Dashboard!</h1>

        <div id="auth-status-display">
            <p>Checking authentication status...</p>
        </div>

<div class="account-info" style="display:none;">
    <h2>Your Profile</h2>
    <form class="user-form" data-mode="update">
      <input type="text" name="full_name" placeholder="Your Full Name" required>
      <input type="text" name="company" placeholder="Company Name" required>
      <input type="email" name="email" placeholder="Business Email" required>
      <input type="tel" name="phone_number" placeholder="Phone Number" required>
      <input type="text" name="address" placeholder="Business Address" required>
      <textarea name="service_request" placeholder="What kind of service/request are you looking for?" required></textarea>
      <input type="password" name="password" placeholder="New Password - leave blank to keep current">
      <input type="password" name="password_confirm" placeholder="Confirm New Password">
      <button type="submit" class="btn-primary">Update Profile</button>
      <p class="form-message" style="margin-top:12px;"></p>
    </form>
</div>

        <div class="invoice-list" style="display:none;">
            <h2>Your Invoices</h2>
            <div id="invoicesContainer">
                <p class="no-invoices">Loading invoices...</p>
            </div>
        </div>

    </div>
</section>

<script>
/* ================= SUPABASE INIT ================= */
const supabaseUrl = 'https://tirkqybcedxfusifslim.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8'; // 🔑 REPLACE THIS
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* ================= ELEMENTS ================= */
const authStatusDisplay = document.getElementById('auth-status-display');
const loginLogoutLink = document.getElementById('loginLogoutLink');
const accountInfoDiv = document.querySelector('.account-info');
const invoiceSection = document.querySelector('.invoice-list');
const invoicesContainer = document.getElementById('invoicesContainer');

/* ================= INIT (CRITICAL FIX) ================= */
init();

async function init() {
    try {
        const { data: { session }, error } = await supabaseClient.auth.getSession();

        console.log("Session:", session);
        console.log("Session error:", error);

        if (session && session.user) {
            handleLoggedIn(session.user);
        } else {
            handleLoggedOut();
        }

    } catch (err) {
        console.error("Init error:", err);
    }
}

/* ================= AUTH LISTENER ================= */
supabaseClient.auth.onAuthStateChange((event, session) => {
    console.log("Auth event:", event);

    if (session && session.user) {
        handleLoggedIn(session.user);
    } else {
        handleLoggedOut();
    }
});

/* ================= LOGGED IN ================= */
function handleLoggedIn(user) {

    // NAV
    loginLogoutLink.textContent = 'My Account';
    loginLogoutLink.href = 'account.html';

    // AUTH STATUS
    authStatusDisplay.innerHTML = '';

    const p = document.createElement('p');
    p.innerHTML = `Logged in as <strong>${user.email}</strong>`;

    const logoutButton = document.createElement('button');
    logoutButton.className = 'btn btn-secondary';
    logoutButton.textContent = 'Logout';

    logoutButton.onclick = async () => {
        await supabaseClient.auth.signOut();
        window.location.href = 'login.html';
    };

    authStatusDisplay.appendChild(p);
    authStatusDisplay.appendChild(logoutButton);

    // SHOW CONTENT
    accountInfoDiv.style.display = 'block';
    invoiceSection.style.display = 'block';

    // FETCH DATA
    populateAccountForm(user);
    getInvoices(user);
}

/* ================= LOGGED OUT ================= */
function handleLoggedOut() {
    loginLogoutLink.textContent = 'Client Login';
    loginLogoutLink.href = 'login.html';

    authStatusDisplay.innerHTML = `
        <p>You are not logged in. <a href="login.html">Login</a></p>
    `;

    accountInfoDiv.style.display = 'none';
    invoiceSection.style.display = 'none';
}

/* ================= POPULATE PROFILE FORM ================= */
async function populateAccountForm(user) {
    try {
        const { data, error } = await supabaseClient
            .from('profiles')
            .select('full_name, company, phone_number, address, information')
            .eq('user_id', user.id)
            .single();

        if (error) {
            console.error("Profile fetch error:", error);
            return;
        }

        const form = document.querySelector('.user-form[data-mode="update"]');
        form.querySelector('[name="full_name"]').value = data?.full_name || '';
        form.querySelector('[name="company"]').value = data?.company || '';
        form.querySelector('[name="email"]').value = user.email || '';
        form.querySelector('[name="phone_number"]').value = data?.phone_number || '';
        form.querySelector('[name="address"]').value = data?.address || '';
        form.querySelector('[name="service_request"]').value = data?.information || '';
        form.querySelector('[name="password"]').value = '';
        form.querySelector('[name="password_confirm"]').value = '';

    } catch (err) {
        console.error("Unexpected profile error:", err);
    }
}

/* ================= INVOICES ================= */
async function getInvoices(user) {
    try {
        const { data, error } = await supabaseClient
            .from('invoices')
            .select('*')
            .eq('user_id', user.id);

        console.log("Invoices:", data);
        console.log("Invoice Error:", error);

        if (error) {
            invoicesContainer.innerHTML = "<p>Error loading invoices</p>";
            return;
        }

        if (!data || data.length === 0) {
            invoicesContainer.innerHTML = "<p class='no-invoices'>No invoices found.</p>";
            return;
        }

        invoicesContainer.innerHTML = '';

        data.forEach(inv => {
            const div = document.createElement('div');
            div.className = 'invoice-card';

            div.innerHTML = `
                <p><strong>Invoice #:</strong> ${inv.invoice_number || inv.id}</p>
                <p><strong>Amount:</strong> R${inv.amount || '0.00'}</p>
                <p><strong>Status:</strong> ${inv.status || 'Pending'}</p>
            `;

            invoicesContainer.appendChild(div);
        });

    } catch (err) {
        console.error("Invoice error:", err);
    }
}

/* ================= MOBILE NAV ================= */
document.getElementById("hamburger").onclick = () => {
    document.getElementById("navMenu").classList.toggle("active");
};
// Form handler for profile update
document.addEventListener('DOMContentLoaded', () => {
  const updateForm = document.querySelector('.user-form[data-mode="update"]');
  if (!updateForm) return;
  
  updateForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const messageEl = updateForm.querySelector('.form-message');
    const formData = Object.fromEntries(new FormData(updateForm).entries());
    
    if (formData.password || formData.password_confirm) {
      if (formData.password !== formData.password_confirm) {
        messageEl.textContent = 'Passwords do not match';
        messageEl.style.color = 'red';
        return;
      }
      if (formData.password.length < 8) {
        messageEl.textContent = 'Password must be at least 8 characters';
        messageEl.style.color = 'red';
        return;
      }
    }
    
    if (!formData.password) delete formData.password;
    delete formData.password_confirm;
    
    if (formData.service_request) {
      formData.information = formData.service_request;
      delete formData.service_request;
    }

    messageEl.textContent = 'Updating...';
    messageEl.style.color = 'orange';

    try {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) throw new Error('Not logged in');
      
      const authUpdates = {};
      if (formData.email !== user.email) authUpdates.email = formData.email;
      if (formData.password) authUpdates.password = formData.password;
      if (Object.keys(authUpdates).length) {
        const { error: authErr } = await supabaseClient.auth.updateUser(authUpdates);
        if (authErr) throw authErr;
      }
      
      const { error: updateErr } = await supabaseClient
        .from('profiles')
        .update({
          full_name: formData.full_name,
          company: formData.company,
          phone_number: formData.phone_number,
          address: formData.address,
          information: formData.information,
          email: formData.email
        })
        .eq('user_id', user.id);
      if (updateErr) throw updateErr;
      
      messageEl.textContent = 'Profile updated!';
      messageEl.style.color = 'green';
      
    } catch (err) {
      messageEl.textContent = err.message || 'Error saving data';
      messageEl.style.color = 'red';
    }
  });
});

</script>

</body>
</html>
