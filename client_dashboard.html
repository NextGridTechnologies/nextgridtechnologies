<style>
    /* Basic styling for the dashboard specific elements */
    body { font-family: 'Poppins', Arial, sans-serif; margin: 0; background-color: #f4f4f4; color: #333; }

    .btn {
        display: inline-block;
        background-color: #007bff;
        color: white;
        padding: 8px 15px;
        border-radius: 5px;
        text-decoration: none;
        margin-top: 10px;
        border: none;
        cursor: pointer;
    }
    .btn:hover { background-color: #0056b3; }
    .error { color: red; font-weight: bold; }

    /* Responsive adjustments for list items if needed */

<div class="container">
    <div class="dashboard-content">
        <h1>Welcome to your Client Dashboard!</h1>
        <p>Here you can view all your invoices, quotes, and other important information.</p>

        <div id="auth-ui">
            <!-- This will be replaced by login/logout buttons -->
            <p>Loading authentication...</p>
        </div>

        <h2 style="margin-top: 30px;">Your Invoices</h2>
        <ul id="invoices-list">
            <!-- Invoices will be loaded here by JavaScript -->
            <li>Loading invoices...</li>
        </ul>
    </div>
</div>

<script src="js/supabase.min.js"></script>
<script>
const supabaseClient = supabase.createClient(
  'https://tirkqybcedxfusifslim.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8',
  { // <--- THIS IS THE IMPORTANT PART YOU NEED TO ADD
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: true
            }
    }
);

    const authUi = document.getElementById('auth-ui');
    const invoicesList = document.getElementById('invoices-list');

    async function initApp() {
        const { data: { user } } = await supabase.auth.getUser();
        console.log('User object:', user);

        if (user) {
            console.log('Logged in user ID:', user.id); 
            authUi.innerHTML = `
                <p>Logged in as: <strong>${user.email}</strong></p>
                <button class="btn" onclick="logout()">Logout</button>
            `;
            fetchUserInvoices(user.id);
        } else {
          console.log('No user logged in.');  
          authUi.innerHTML = `
                <p>You need to log in to view your dashboard.</p>
                <button class="btn" onclick="redirectToLogin()">Login / Sign Up</button>
            `;
            invoicesList.innerHTML = '<li>Please log in to see your invoices.</li>';
        }
    }

    async function fetchUserInvoices(userId) {
        invoicesList.innerHTML = '<li>Fetching your invoices...</li>';
        try {
            const { data, error } = await supabase
                .from('invoices')
                .select('id, invoice_number, invoice_date, total_amount_due, status')
                .eq('user_id', userId)
                .order('invoice_date', { ascending: false });

            if (error) {
                console.error('Error fetching invoices:', error.message);
                invoicesList.innerHTML = `<li class="error">Error loading invoices: ${error.message}</li>`;
                return;
            }

            if (data.length === 0) {
                invoicesList.innerHTML = '<li>No invoices found for your account.</li>';
                return;
            }

            invoicesList.innerHTML = ''; // Clear loading message
            data.forEach(invoice => {
                const listItem = document.createElement('li');
                // Format total_amount_due to 2 decimal places with 'R ' prefix
                const formattedTotal = `R ${invoice.total_amount_due ? invoice.total_amount_due.toFixed(2) : '0.00'}`;
                listItem.innerHTML = `
                    <a href="invoice_details.html?id=${invoice.id}">
                        Invoice ${invoice.invoice_number} - ${formattedTotal}
                    </a>
                    <span class="invoice-status">Status: ${invoice.status}</span>
                `;
                invoicesList.appendChild(listItem);
            });

        } catch (err) {
            console.error('An unexpected error occurred:', err.message);
            invoicesList.innerHTML = `<li class="error">An unexpected error occurred.</li>`;
        }
    }

    async function logout() {
        const { error } = await supabase.auth.signOut();
        if (error) {
            console.error('Error logging out:', error.message);
            alert('Error logging out: ' + error.message);
        } else {
            window.location.reload(); // Reloads to show logged-out state
        }
    }

    function redirectToLogin() {
        window.location.href = 'login.html';
    }

    // Initialize the app when the DOM is fully loaded
    document.addEventListener('DOMContentLoaded', initApp);

    // Hamburger menu functionality from your login.html
    const hamburger = document.getElementById("hamburger");
    const navMenu = document.getElementById("navMenu");
    if (hamburger && navMenu) {
      hamburger.addEventListener("click", () => {
        navMenu.classList.toggle("active");
      });
    }
</script>
          
</body>
