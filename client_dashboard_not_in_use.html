        );

        // --- Supabase Auth State Change Listener ---
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
            const adminLinkContainer = document.getElementById('adminLinkContainer');
            const loginLogoutLink = document.getElementById('loginLogoutLink');
            const authUiDiv = document.getElementById('auth-ui');

            console.log('onAuthStateChange fired:', event, session); // Added: See what event fired

            if (session && session.user) {
                // --- User is Logged In ---
                console.log('onAuthStateChange: User is signed in:', session.user.id);
                loginLogoutLink.textContent = 'My Account';
                loginLogoutLink.href = 'account.html'; // Link to account.html as they are logged in

                // Populate auth-ui with Logout button
                authUiDiv.innerHTML = `
                    <p>You are logged in as <strong>${session.user.email}</strong>.</p>
                    <button id="logoutButton" class="btn">Logout</button>
                `;
                console.log('auth-ui populated with logoutButton'); // Added: Confirm HTML update

                // Attach event listener to the newly created logoutButton
                const logoutButton = document.getElementById('logoutButton');
                if (logoutButton) { // Added: Check if button exists before attaching listener
                    logoutButton.addEventListener('click', async () => {
                        console.log('Logout button clicked from auth-ui!'); // Added: Confirm click detected
                        const { error } = await supabaseClient.auth.signOut();
                        if (error) {
                            console.error('Error signing out:', error.message);
                            alert('Error signing out: ' + error.message);
                        } else {
                            console.log('signOut() called successfully, awaiting redirect...'); // Added: Confirm signOut called
                        }
                        // Redirection is handled by the 'SIGNED_OUT' event below
                    });
                    console.log('Logout button event listener attached.'); // Added: Confirm listener attached
                } else {
                    console.error('Logout button not found after populating auth-ui.'); // Added: Error if button missing
                }

                // Fetch user role for admin link
                const { data: profileData, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('role')
                    .eq('user_id', session.user.id) // Using 'user_id' as column name
                    .single();

                if (!profileError && profileData && profileData.role === 'admin') {
                    adminLinkContainer.innerHTML = '<a href="admin_dashboard.html" class="nav-cta">Admin Panel</a>';
                } else {
                    adminLinkContainer.innerHTML = ''; // Hide admin link for non-admins
                }

                // Call function to load invoices (assuming this exists or will be added)
                // loadUserInvoices(session.user.id);

            } else {
                // --- User is Not Logged In (or has just logged out) ---
                console.log('onAuthStateChange: User is not signed in or signed out.');
                loginLogoutLink.textContent = 'Client Login';
                loginLogoutLink.href = 'login.html';
                adminLinkContainer.innerHTML = ''; // Hide admin link

                // If user logs out or is not authenticated, redirect to login page
                // We prevent redirect if already on login.html to avoid infinite loops,
                // but client_dashboard.html should always redirect if not logged in.
                if (!window.location.pathname.endsWith('login.html')) {
                     console.log('Redirecting to login.html due to SIGNED_OUT or no session.'); // Added: Confirm redirect
                     window.location.href = 'login.html';
                }
            }
        });
