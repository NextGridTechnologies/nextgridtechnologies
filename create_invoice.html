<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Invoice - NextGrid Technologies</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
    body { font-family: 'Poppins', sans-serif; background: #f4f4f4; margin: 0; }
   .container { max-width: 1000px; margin: 30px auto; padding: 20px; background: white; border-radius: 8px; }
    h1 { color: #007bff; }
   .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
   .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: 600; margin-bottom: 5px; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
   .line-items { margin-top: 30px; }
   .line-item-row { display: grid; grid-template-columns: 3fr 1fr 1fr 1fr auto; gap: 10px; align-items: end; margin-bottom: 10px; }
   .btn { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
   .btn:hover { background: #0056b3; }
   .btn-danger { background: #dc3545; }
   .totals { margin-top: 20px; text-align: right; }
   .totals div { margin: 5px 0; }
   .total-final { font-size: 1.2em; font-weight: bold; }
</style>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

<div id="header"></div>

<div class="container">
    <h1>Create New Invoice</h1>
    <a href="admin_dashboard.html">&larr; Back to Admin Dashboard</a>

    <form id="invoiceForm">
        <h3>1. Select Client</h3>
        <div class="form-group">
            <label for="clientSelect">Client</label>
            <select id="clientSelect" required>
                <option value="">Loading clients...</option>
            </select>
        </div>
        <div id="clientDetails" style="display:none; background:#f8f9fa; padding:15px; border-radius:5px; margin-bottom:20px;"></div>

        <h3>2. Invoice Details</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Invoice Number</label>
                <input type="text" id="invoiceNumber" required>
            </div>
            <div class="form-group">
                <label>Invoice Date</label>
                <input type="date" id="invoiceDate" required>
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="dueDate" required>
            </div>
            <div class="form-group">
                <label>Payment Terms</label>
                <input type="text" id="paymentTerms" value="Due on Receipt">
            </div>
            <div class="form-group">
                <label>Purchase Order</label>
                <input type="text" id="purchaseOrder">
            </div>
        </div>

        <h3>3. Line Items</h3>
        <div class="line-items" id="lineItemsContainer"></div>
        <button type="button" class="btn" onclick="addLineItem()">+ Add Line Item</button>

        <div class="totals">
            <div>Subtotal: <span id="subtotal">R 0.00</span></div>
            <div>Discount: R <input type="number" id="discountAmount" value="0" step="0.01" style="width:100px; display:inline;"></div>
            <div>VAT (15%): <span id="vatAmount">R 0.00</span></div>
            <div class="total-final">Total: <span id="totalAmount">R 0.00</span></div>
        </div>

        <h3>4. Payment Instructions</h3>
        <textarea id="paymentInstructions" rows="4">Bank: FNB
Account: 123456789
Branch: 250655
Ref: Invoice Number</textarea>

        <br><br>
        <button type="submit" class="btn">Create Invoice</button>
        <p id="message"></p>
    </form>
</div>

<script src="js/supabase.min.js"></script>
<script>
const supabaseClient = supabase.createClient(
    'https://tirkqybcedxfusifslim.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8',
    { auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true } }
);

let lineItemCount = 0;
let selectedClient = null;

async function initHeader() {
    const res = await fetch('header.html');
    const data = await res.text();
    document.getElementById('header').innerHTML = data;

    document.getElementById('hamburger')?.addEventListener('click', () => {
        document.getElementById('navMenu')?.classList.toggle('active');
    });

    const { data: { user } } = await supabaseClient.auth.getUser();
    const adminLinkContainer = document.getElementById('adminLinkContainer');
    const loginLogoutLink = document.getElementById('loginLogoutLink');

    if (user && loginLogoutLink) {
        loginLogoutLink.textContent = 'Sign Out';
        loginLogoutLink.href = '#';
        loginLogoutLink.onclick = async (e) => {
            e.preventDefault();
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        };

        if (adminLinkContainer) {
            const { data: profileData } = await supabaseClient
               .from('profiles')
               .select('role')
               .eq('user_id', user.id)
               .single();

            if (profileData && profileData.role === 'admin') {
                adminLinkContainer.innerHTML = '<a href="admin_dashboard.html">Admin Portal</a>';
            }
        }
    } else if (loginLogoutLink) {
        loginLogoutLink.textContent = 'Client Login';
        loginLogoutLink.href = 'login.html';
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    await initHeader();

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('invoiceDate').value = today;
    document.getElementById('dueDate').value = today;

    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return window.location.href = 'login.html';

    const { data: profile } = await supabaseClient.from('profiles').select('role').eq('user_id', user.id).single();
    if (!profile || profile.role!== 'admin') {
        document.body.innerHTML = '<h1>Access Denied</h1><p>Admin only.</p>';
        return;
    }

    await loadClients();
    addLineItem();
    generateInvoiceNumber();
});

async function loadClients() {
    const select = document.getElementById('clientSelect');

    const { data: clients, error } = await supabaseClient
     .from('profiles')
     .select('user_id, full_name, company, email, address, phone_number, vat_number')
     .neq('role', 'admin')
     .order('full_name');

    if (error) {
        console.error('Error loading clients:', error);
        select.innerHTML = '<option value="">Error loading clients</option>';
        return;
    }

    select.innerHTML = '<option value="">-- Select a Client --</option>';
    clients.forEach(c => {
        select.innerHTML += `<option value="${c.user_id}">${c.full_name} - ${c.company || c.email}</option>`;
    });

    select.onchange = () => {
        selectedClient = clients.find(c => c.user_id === select.value);
        const details = document.getElementById('clientDetails');
        if (selectedClient) {
            details.style.display = 'block';
            details.innerHTML = `
                <strong>${selectedClient.full_name}</strong><br>
                ${selectedClient.company || ''}<br>
                ${selectedClient.email}<br>
                ${selectedClient.phone_number || ''}<br>
                ${selectedClient.address || ''}<br>
                ${selectedClient.vat_number? 'VAT: ' + selectedClient.vat_number : ''}
            `;
        } else {
            details.style.display = 'none';
        }
    };

    // Handle pre-select from URL param
    const urlParams = new URLSearchParams(window.location.search);
    const preSelectClient = urlParams.get('client');
    if (preSelectClient) {
        select.value = preSelectClient;
        select.dispatchEvent(new Event('change'));
    }
}

function generateInvoiceNumber() {
    const date = new Date();
    const num = `INV-${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2,'0')}-${Math.floor(Math.random()*9000)+1000}`;
    document.getElementById('invoiceNumber').value = num;
}

function addLineItem() {
    lineItemCount++;
    const div = document.createElement('div');
    div.className = 'line-item-row';
    div.id = `lineItem${lineItemCount}`;
    div.innerHTML = `
        <div><label>Description</label><input type="text" class="item-desc" required></div>
        <div><label>Qty</label><input type="number" class="item-qty" value="1" min="0" step="0.01" required></div>
        <div><label>Rate</label><input type="number" class="item-rate" value="0" min="0" step="0.01" required></div>
        <div><label>Amount</label><input type="text" class="item-amount" value="R 0.00" readonly></div>
        <div><button type="button" class="btn btn-danger" onclick="removeLineItem(${lineItemCount})">X</button></div>
    `;
    document.getElementById('lineItemsContainer').appendChild(div);

    div.querySelector('.item-qty').oninput = calculateTotals;
    div.querySelector('.item-rate').oninput = calculateTotals;
}

function removeLineItem(id) {
    document.getElementById(`lineItem${id}`).remove();
    calculateTotals();
}

function calculateTotals() {
    let subtotal = 0;
    document.querySelectorAll('.line-item-row').forEach(row => {
        const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
        const rate = parseFloat(row.querySelector('.item-rate').value) || 0;
        const amount = qty * rate;
        row.querySelector('.item-amount').value = `R ${amount.toFixed(2)}`;
        subtotal += amount;
    });

    const discount = parseFloat(document.getElementById('discountAmount').value) || 0;
    const vat = (subtotal - discount) * 0.15;
    const total = subtotal - discount + vat;

    document.getElementById('subtotal').textContent = `R ${subtotal.toFixed(2)}`;
    document.getElementById('vatAmount').textContent = `R ${vat.toFixed(2)}`;
    document.getElementById('totalAmount').textContent = `R ${total.toFixed(2)}`;
}

document.getElementById('discountAmount').oninput = calculateTotals;

document.getElementById('invoiceForm').onsubmit = async (e) => {
    e.preventDefault();
    const msg = document.getElementById('message');
    if (!selectedClient) {
        msg.textContent = 'Please select a client';
        msg.style.color = 'red';
        return;
    }

    msg.textContent = 'Creating invoice...';
    msg.style.color = 'orange';

    const items = [];
    document.querySelectorAll('.line-item-row').forEach(row => {
        const desc = row.querySelector('.item-desc').value;
        const qty = parseFloat(row.querySelector('.item-qty').value);
        const rate = parseFloat(row.querySelector('.item-rate').value);
        if (desc && qty > 0) {
            items.push({ description: desc, quantity: qty, rate: rate });
        }
    });

    if (items.length === 0) {
        msg.textContent = 'Add at least one line item';
        msg.style.color = 'red';
        return;
    }

    const subtotal = parseFloat(document.getElementById('subtotal').textContent.replace('R ', ''));
    const discount = parseFloat(document.getElementById('discountAmount').value) || 0;
    const vat = parseFloat(document.getElementById('vatAmount').textContent.replace('R ', ''));
    const total = parseFloat(document.getElementById('totalAmount').textContent.replace('R ', ''));

    try {
        const { data: invoice, error: invError } = await supabaseClient
         .from('invoices')
         .insert({
                invoice_number: document.getElementById('invoiceNumber').value,
                user_id: selectedClient.user_id,
                client_name: selectedClient.full_name,
                client_email: selectedClient.email,
                client_phone: selectedClient.phone_number,
                client_address: selectedClient.address,
                client_vat_number: selectedClient.vat_number,
                invoice_date: document.getElementById('invoiceDate').value,
                due_date: document.getElementById('dueDate').value,
                payment_terms: document.getElementById('paymentTerms').value,
                purchase_order: document.getElementById('purchaseOrder').value,
                subtotal: subtotal,
                discount_amount: discount,
                vat_percentage: 15.00,
                vat_amount: vat,
                total_amount_due: total,
                payment_instructions: document.getElementById('paymentInstructions').value,
                status: 'Sent'
            })
         .select()
         .single();

        if (invError) throw invError;

        const itemsToInsert = items.map(i => ({...i, invoice_id: invoice.id }));
        const { error: itemsError } = await supabaseClient.from('invoice_items').insert(itemsToInsert);
        if (itemsError) throw itemsError;

        msg.textContent = 'Invoice created!';
        msg.style.color = 'green';
        setTimeout(() => window.location.href = `invoice.html?id=${invoice.id}`, 1000);

    } catch (error) {
        msg.textContent = 'Error: ' + error.message;
        msg.style.color = 'red';
    }
};
</script>
</body>
</html>
