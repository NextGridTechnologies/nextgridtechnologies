<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create or Update Invoice - NextGrid Technologies</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="create_invoice.css">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-C9DS2C71G6"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-C9DS2C71G6');
</script>
</head>
<body>

<header>
  <div class="container header-flex">
    <div class="logo-area">
      <img src="favicon.ico" alt="NextGrid Technologies Logo" class="logo">
      <a href="index.html" class="logo-text">NextGrid Technologies</a>
    </div>
    <nav id="navMenu">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="blog.html">Blog</a>
      <div id="adminLinkContainer"></div>
      <a href="login.html" class="nav-cta" id="loginLogoutLink">Client Login</a>
    </nav>
    <div class="header-contact">
      <a href="tel:+27680330794" class="btn-phone">📞 Call</a>
      <a href="https://wa.me/27680330794" target="_blank" class="btn-whatsapp">💬 WhatsApp</a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">☰</button>
  </div>
</header>

<div class="container">
  <h1>Create or Update Invoice</h1>
  <form id="invoiceForm">
    <!-- ===== Client Selection ===== -->
    <div class="form-group">
      <label for="clientSelect">Select Client:</label>
      <select id="clientSelect" required>
        <option value="">-- Select a client --</option>
      </select>
      <input type="hidden" id="selectedUserId">
    </div>

    <!-- ===== Autofilled Client Info ===== -->
    <!----<div class="form-group"><label>Client Name:</label><input type="text" id="clientName" readonly></div>--->
    <div class="form-group"><label>Client Email:</label><input type="email" id="clientEmail" readonly></div>
    <div class="form-group"><label>Client Address:</label><input type="text" id="clientAddress" readonly></div>
    <div class="form-group"><label>Client Phone:</label><input type="tel" id="clientPhone" readonly></div>

    <!-- ===== Invoice Details ===== -->
    <div class="form-group"><label for="invoiceNumber">Invoice Number:</label><input type="text" id="invoiceNumber" required></div>
    <div class="form-group"><label for="invoiceDate">Invoice Date:</label><input type="date" id="invoiceDate" required></div>
    <div class="form-group"><label for="issueDate">Issue Date:</label><input type="date" id="issueDate" required></div>
    <div class="form-group"><label for="dueDate">Due Date:</label><input type="date" id="dueDate" required></div>
    <div class="form-group">
      <label for="status">Status:</label>
      <select id="status" required>
        <option value="draft">Draft</option>
        <option value="sent">Sent</option>
        <option value="paid">Paid</option>
        <option value="overdue">Overdue</option>
      </select>
    </div>
    <div class="form-group"><label for="paymentTerms">Payment Terms:</label><input type="text" id="paymentTerms" value="Net 15"></div>
    <div class="form-group"><label for="purchaseOrder">Purchase Order (Optional):</label><input type="text" id="purchaseOrder"></div>
    <div class="form-group"><label for="paymentInstructions">Payment Instructions:</label><textarea id="paymentInstructions" rows="4"></textarea></div>

    <!-- ===== Calculated Totals ===== -->
    <div class="form-group"><label for="subtotal">Subtotal (calculated):</label><input type="number" id="subtotal" step="0.01" value="0.00" readonly></div>
    <div class="form-group"><label for="discountRate">Discount Rate (%):</label><input type="number" id="discountRate" step="0.01" value="0.00" min="0" max="100"></div>
    <div class="form-group"><label for="discountAmount">Discount Amount (R):</label><input type="number" id="discountAmount" step="0.01" value="0.00" readonly></div>
    <div class="form-group"><label for="vatRate">VAT Rate (%):</label><input type="number" id="vatRate" step="0.01" value="15.00" min="0" max="100"></div>
    <div class="form-group"><label for="vatAmount">VAT Amount (R):</label><input type="number" id="vatAmount" step="0.01" value="0.00" readonly></div>
    <div class="form-group"><label for="totalAmountDue">Total Amount Due (calculated):</label><input type="number" id="totalAmountDue" step="0.01" value="0.00" readonly></div>

    <!-- ===== Line Items ===== -->
    <h2>Line Items</h2>
    <div id="lineItemsContainer"></div>
    <button type="button" class="btn-primary add-line-item-btn" onclick="addLineItem()">Add Line Item</button>

    <!-- ===== Submit ===== -->
    <div class="button-group">
      <button type="submit" class="btn-primary">Save Invoice</button>
    </div>
    <div id="message" class="message"></div>
  </form>
</div>

<script src="js/supabase.min.js"></script>
<script>
const supabaseClient = supabase.createClient(
  'https://tirkqybcedxfusifslim.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8'
);

const invoiceForm = document.getElementById('invoiceForm');
const messageDiv = document.getElementById('message');
const lineItemsContainer = document.getElementById('lineItemsContainer');
let lineItemCount = 0;

const clientSelect = document.getElementById('clientSelect');
const selectedUserIdInput = document.getElementById('selectedUserId');
const clientNameInput = document.getElementById('clientName');
const clientEmailInput = document.getElementById('clientEmail');
const clientAddressInput = document.getElementById('clientAddress');
const clientPhoneInput = document.getElementById('clientPhone');

let allClientProfiles = [];

// --- Helper Functions ---
function showMessage(text, type) {
  messageDiv.textContent = text;
  messageDiv.className = `message ${type}`;
  setTimeout(() => { messageDiv.textContent = ''; messageDiv.className = 'message'; }, 5000);
}

function addLineItem() {
  const newItemId = lineItemCount++;
  const lineItemHtml = `
    <div class="line-item-section" data-item-id="${newItemId}">
      <div class="line-item-header">
        <h3>Line Item #${newItemId + 1}</h3>
        <button type="button" class="remove-line-item-btn" onclick="removeLineItem(this)">Remove</button>
      </div>
      <div class="line-item-fields">
        <div class="form-group"><label>Description:</label><input type="text" id="itemDescription_${newItemId}" required></div>
        <div class="form-group"><label>Qty:</label><input type="number" id="itemQty_${newItemId}" step="0.01" value="1" min="0" oninput="calculateTotals()"></div>
        <div class="form-group"><label>Rate (R):</label><input type="number" id="itemRate_${newItemId}" step="0.01" value="0.00" min="0" oninput="calculateTotals()"></div>
        <div class="form-group"><label>Amount (R):</label><input type="number" id="itemAmount_${newItemId}" step="0.01" value="0.00" readonly></div>
      </div>
    </div>`;
  lineItemsContainer.insertAdjacentHTML('beforeend', lineItemHtml);
}

function removeLineItem(button) {
  const itemSection = button.closest('.line-item-section');
  if (lineItemsContainer.children.length > 1) {
    itemSection.remove();
    calculateTotals();
  } else {
    showMessage("Cannot remove the last line item.", "error");
  }
}

function calculateTotals() {
  let subtotal = 0;
  document.querySelectorAll('.line-item-section').forEach(section => {
    const itemId = section.dataset.itemId;
    const qty = parseFloat(document.getElementById(`itemQty_${itemId}`).value) || 0;
    const rate = parseFloat(document.getElementById(`itemRate_${itemId}`).value) || 0;
    const amountInput = document.getElementById(`itemAmount_${itemId}`);
    const itemAmount = qty * rate;
    amountInput.value = itemAmount.toFixed(2);
    subtotal += itemAmount;
  });

  document.getElementById('subtotal').value = subtotal.toFixed(2);
  const discountRate = parseFloat(document.getElementById('discountRate').value) || 0;
  const vatRate = parseFloat(document.getElementById('vatRate').value) || 0;
  const discountAmount = subtotal * (discountRate / 100);
  const subtotalAfterDiscount = subtotal - discountAmount;
  const vatAmount = subtotalAfterDiscount * (vatRate / 100);
  const totalAmountDue = subtotalAfterDiscount + vatAmount;
  document.getElementById('discountAmount').value = discountAmount.toFixed(2);
  document.getElementById('vatAmount').value = vatAmount.toFixed(2);
  document.getElementById('totalAmountDue').value = totalAmountDue.toFixed(2);
}

['discountRate', 'vatRate'].forEach(id => document.getElementById(id).addEventListener('input', calculateTotals));

async function fetchClientProfiles() {
  const { data, error } = await supabaseClient.from('profiles')
    .select('user_id, full_name, email, company, address, phone_number')
    .eq('role', 'client');
  if (error) {
    showMessage(`Error fetching clients: ${error.message}`, 'error');
    return [];
  }
  return data;
}

function populateClientDropdown(clients) {
  clientSelect.innerHTML = '<option value="">-- Select a client --</option>';
  allClientProfiles = clients;
  clients.forEach(client => {
    const option = document.createElement('option');
    option.value = client.user_id;
    option.textContent = client.full_name || client.email;
    clientSelect.appendChild(option);
  });
}

function autofillClientDetails() {
  const selectedId = clientSelect.value;
  const selectedClient = allClientProfiles.find(client => client.user_id === selectedId);
  if (selectedClient) {
    selectedUserIdInput.value = selectedClient.user_id;
    clientNameInput.value = selectedClient.full_name || '';
    clientEmailInput.value = selectedClient.email || '';
    clientAddressInput.value = selectedClient.address || '';
    clientPhoneInput.value = selectedClient.phone_number || '';
  } else {
    [selectedUserIdInput, clientNameInput, clientEmailInput, clientAddressInput, clientPhoneInput].forEach(input => input.value = '');
  }
}

clientSelect.addEventListener('change', autofillClientDetails);

// --- Submission Logic with Update/New Check ---
invoiceForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  showMessage('Saving invoice...', 'info');

  try {
    const invoiceNumber = document.getElementById('invoiceNumber').value.trim();
    if (!invoiceNumber) throw new Error("Invoice Number is required.");
    const userId = document.getElementById('selectedUserId').value;
    if (!userId) throw new Error("No client selected.");

    const invoiceData = {
      user_id: userId,
      invoice_number: invoiceNumber,
      invoice_date: document.getElementById('invoiceDate').value,
      issue_date: document.getElementById('issueDate').value,
      due_date: document.getElementById('dueDate').value,
      status: document.getElementById('status').value,
      client_name: clientNameInput.value,
      client_email: clientEmailInput.value,
      client_phone: clientPhoneInput.value,
      subtotal: parseFloat(document.getElementById('subtotal').value),
      discount_amount: parseFloat(document.getElementById('discountAmount').value),
      vat_percentage: parseFloat(document.getElementById('vatRate').value),
      vat_amount: parseFloat(document.getElementById('vatAmount').value),
      total_amount_due: parseFloat(document.getElementById('totalAmountDue').value),
      payment_terms: document.getElementById('paymentTerms').value,
      purchase_order: document.getElementById('purchaseOrder').value || null,
      payment_instructions: document.getElementById('paymentInstructions').value,
      currency: 'ZAR'
    };

    const { data: existingInvoice } = await supabaseClient
      .from('invoices')
      .select('id')
      .eq('invoice_number', invoiceNumber)
      .single();

    let invoiceId;
    if (existingInvoice) {
      const { data, error } = await supabaseClient
        .from('invoices')
        .update(invoiceData)
        .eq('id', existingInvoice.id)
        .select('id')
        .single();
      if (error) throw new Error(`Failed to update invoice: ${error.message}`);
      invoiceId = data.id;
      await supabaseClient.from('invoice_items').delete().eq('invoice_id', invoiceId);
    } else {
      const { data, error } = await supabaseClient
        .from('invoices')
        .insert(invoiceData)
        .select('id')
        .single();
      if (error) throw new Error(`Failed to create invoice: ${error.message}`);
      invoiceId = data.id;
    }

    const lineItemsData = Array.from(document.querySelectorAll('.line-item-section')).map(section => {
      const itemId = section.dataset.itemId;
      return {
        invoice_id: invoiceId,
        description: document.getElementById(`itemDescription_${itemId}`).value,
        quantity: parseFloat(document.getElementById(`itemQty_${itemId}`).value),
        rate: parseFloat(document.getElementById(`itemRate_${itemId}`).value),
        amount: parseFloat(document.getElementById(`itemAmount_${itemId}`).value),
      };
    });

    if (lineItemsData.length > 0) {
      const { error: itemsError } = await supabaseClient.from('invoice_items').insert(lineItemsData);
      if (itemsError) throw new Error(`Invoice saved, but failed to save line items: ${itemsError.message}`);
    }

    showMessage(existingInvoice ? 'Invoice updated successfully!' : 'Invoice created successfully!', 'success');
    invoiceForm.reset();
    populateClientDropdown(allClientProfiles);
    lineItemsContainer.innerHTML = '';
    addLineItem();
    calculateTotals();
  } catch (err) {
    console.error(err);
    showMessage(err.message, 'error');
  }
});

// --- Initialization ---
document.addEventListener('DOMContentLoaded', async () => {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) window.location.href = 'login.html';

  const { data: profile } = await supabaseClient.from('profiles').select('role').eq('user_id', user.id).single();
  if (!profile || profile.role !== 'admin') window.location.href = 'client_dashboard.html';

  document.getElementById('loginLogoutLink').textContent = 'Logout';
  document.getElementById('loginLogoutLink').href = '#';
  document.getElementById('loginLogoutLink').onclick = async (e) => {
    e.preventDefault();
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  };
  document.getElementById('adminLinkContainer').innerHTML = '<a href="admin_dashboard.html" class="nav-cta">Admin Panel</a>';

  const clients = await fetchClientProfiles();
  populateClientDropdown(clients);

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('invoiceDate').value = today;
  document.getElementById('issueDate').value = today;

  addLineItem();

  const hamburger = document.getElementById("hamburger");
  const navMenu = document.getElementById("navMenu");
  if (hamburger && navMenu) hamburger.addEventListener("click", () => navMenu.classList.toggle("active"));
});
</script>
</body>
</html>
