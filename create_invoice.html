<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create or Edit Invoice - NextGrid Technologies</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="create_invoice.css">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-C9DS2C71G6"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-C9DS2C71G6');
</script>
</head>
<body>

<header>
  <div class="container header-flex">
    <div class="logo-area">
      <img src="favicon.ico" alt="NextGrid Technologies Logo" class="logo">
      <a href="index.html" class="logo-text">NextGrid Technologies</a>
    </div>
    <nav id="navMenu">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="blog.html">Blog</a>
      <div id="adminLinkContainer"></div>
      <a href="login.html" class="nav-cta" id="loginLogoutLink">Client Login</a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">☰</button>
  </div>
</header>

<div class="container">
  <h1>Create or Edit Invoice</h1>
  <form id="invoiceForm">
      <div class="form-group">
          <label for="clientSelect">Select Client:</label>
          <select id="clientSelect" required>
              <option value="">-- Select a client --</option>
          </select>
          <input type="hidden" id="selectedUserId">
      </div>

      <div class="form-group">
          <label>Invoice Mode:</label>
          <input type="radio" name="invoiceMode" id="newInvoice" value="new" checked> Create New Invoice
          <input type="radio" name="invoiceMode" id="editInvoice" value="edit"> Edit Existing Invoice
      </div>

      <div class="form-group" id="existingInvoiceContainer" style="display:none;">
          <label for="existingInvoiceSelect">Select Existing Invoice:</label>
          <select id="existingInvoiceSelect">
              <option value="">-- Select an invoice --</option>
          </select>
      </div>

      <div class="form-group"><label for="clientEmail">Client Email:</label><input type="email" id="clientEmail" readonly></div>
      <div class="form-group"><label for="clientAddress">Client Address:</label><input type="text" id="clientAddress" readonly></div>
      <div class="form-group"><label for="clientPhone">Client Phone:</label><input type="tel" id="clientPhone" readonly></div>
      <div class="form-group"><label for="invoiceNumber">Invoice Number:</label><input type="text" id="invoiceNumber" required></div>
      <div class="form-group"><label for="invoiceDate">Invoice Date:</label><input type="date" id="invoiceDate" required></div>
      <div class="form-group"><label for="issueDate">Issue Date:</label><input type="date" id="issueDate" required></div>
      <div class="form-group"><label for="dueDate">Due Date:</label><input type="date" id="dueDate" required></div>
      <div class="form-group">
          <label for="status">Status:</label>
          <select id="status" required>
              <option value="draft">Draft</option>
              <option value="sent">Sent</option>
              <option value="paid">Paid</option>
              <option value="overdue">Overdue</option>
          </select>
      </div>
      <div class="form-group"><label for="paymentTerms">Payment Terms:</label><input type="text" id="paymentTerms" value="Net 15"></div>
      <div class="form-group"><label for="purchaseOrder">Purchase Order (Optional):</label><input type="text" id="purchaseOrder"></div>
      <div class="form-group"><label for="paymentInstructions">Payment Instructions:</label><textarea id="paymentInstructions" rows="4"></textarea></div>
      <div class="form-group"><label for="subtotal">Subtotal (calculated):</label><input type="number" id="subtotal" step="0.01" value="0.00" readonly></div>
      <div class="form-group"><label for="discountRate">Discount Rate (%):</label><input type="number" id="discountRate" step="0.01" value="0.00" min="0" max="100"></div>
      <div class="form-group"><label for="discountAmount">Discount Amount (R):</label><input type="number" id="discountAmount" step="0.01" value="0.00" readonly></div>
      <div class="form-group"><label for="vatRate">VAT Rate (%):</label><input type="number" id="vatRate" step="0.01" value="15.00" min="0" max="100"></div>
      <div class="form-group"><label for="vatAmount">VAT Amount (R):</label><input type="number" id="vatAmount" step="0.01" value="0.00" readonly></div>
      <div class="form-group"><label for="totalAmountDue">Total Amount Due (calculated):</label><input type="number" id="totalAmountDue" step="0.01" value="0.00" readonly></div>

      <h2>Line Items</h2>
      <div id="lineItemsContainer"></div>
      <button type="button" class="btn-primary add-line-item-btn" onclick="addLineItem()">Add Line Item</button>

      <div class="button-group">
          <button type="submit" class="btn-primary">Save Invoice</button>
      </div>
      <div id="message" class="message"></div>
  </form>
</div>

<script src="js/supabase.min.js"></script>
<script>
const supabaseClient = supabase.createClient(
    'https://tirkqybcedxfusifslim.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8',
    { auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true } }
);

const invoiceForm = document.getElementById('invoiceForm');
const messageDiv = document.getElementById('message');
const lineItemsContainer = document.getElementById('lineItemsContainer');
let lineItemCount = 0;

const clientSelect = document.getElementById('clientSelect');
const selectedUserIdInput = document.getElementById('selectedUserId');
const clientEmailInput = document.getElementById('clientEmail');
const clientAddressInput = document.getElementById('clientAddress');
const clientPhoneInput = document.getElementById('clientPhone');
const invoiceNumberInput = document.getElementById('invoiceNumber');
const existingInvoiceContainer = document.getElementById('existingInvoiceContainer');
const existingInvoiceSelect = document.getElementById('existingInvoiceSelect');
const newInvoiceRadio = document.getElementById('newInvoice');
const editInvoiceRadio = document.getElementById('editInvoice');

let allClientProfiles = [];
let currentInvoiceData = null;

// ---------- Utility Functions ----------
function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = `message ${type}`;
    setTimeout(() => { messageDiv.textContent = ''; messageDiv.className = 'message'; }, 5000);
}

function addLineItem(prefill={}) {
    const newItemId = lineItemCount++;
    const html = `
    <div class="line-item-section" data-item-id="${newItemId}">
        <div class="line-item-header">
            <h3>Line Item #${newItemId+1}</h3>
            <button type="button" onclick="removeLineItem(this)">Remove</button>
        </div>
        <div class="line-item-fields">
            <label>Description: <input type="text" id="itemDescription_${newItemId}" value="${prefill.description||''}" required></label>
            <label>Qty: <input type="number" id="itemQty_${newItemId}" value="${prefill.quantity||1}" step="0.01" min="0" oninput="calculateTotals()"></label>
            <label>Rate: <input type="number" id="itemRate_${newItemId}" value="${prefill.rate||0}" step="0.01" min="0" oninput="calculateTotals()"></label>
            <label>Amount: <input type="number" id="itemAmount_${newItemId}" value="${prefill.amount||0}" readonly></label>
        </div>
    </div>`;
    lineItemsContainer.insertAdjacentHTML('beforeend', html);
    calculateTotals();
}

function removeLineItem(button){
    const section = button.closest('.line-item-section');
    if(lineItemsContainer.children.length>1){ section.remove(); calculateTotals(); }
    else showMessage("Cannot remove last line item", "error");
}

function calculateTotals(){
    let subtotal=0;
    document.querySelectorAll('.line-item-section').forEach(sec=>{
        const id=sec.dataset.itemId;
        const qty=parseFloat(document.getElementById(`itemQty_${id}`).value)||0;
        const rate=parseFloat(document.getElementById(`itemRate_${id}`).value)||0;
        const amt=qty*rate;
        document.getElementById(`itemAmount_${id}`).value=amt.toFixed(2);
        subtotal+=amt;
    });
    const discountRate=parseFloat(document.getElementById('discountRate').value)||0;
    const vatRate=parseFloat(document.getElementById('vatRate').value)||0;
    const discount=subtotal*(discountRate/100);
    const subtotalAfter=subtotal-discount;
    const vat=subtotalAfter*(vatRate/100);
    const total=subtotalAfter+vat;
    document.getElementById('subtotal').value=subtotal.toFixed(2);
    document.getElementById('discountAmount').value=discount.toFixed(2);
    document.getElementById('vatAmount').value=vat.toFixed(2);
    document.getElementById('totalAmountDue').value=total.toFixed(2);
}

['discountRate','vatRate'].forEach(id=>document.getElementById(id).addEventListener('input',calculateTotals));

// ---------- Client & Invoice Functions ----------
async function fetchClients(){
    const {data,error}=await supabaseClient.from('profiles').select('user_id,full_name,company,email,address,phone_number').eq('role','client');
    if(error){showMessage(error.message,'error'); return [];}
    return data;
}

function populateClients(clients){
    clientSelect.innerHTML='<option value="">-- Select a client --</option>';
    allClientProfiles=clients;
    clients.forEach(c=>{
        const opt=document.createElement('option');
        opt.value=c.user_id;
        opt.textContent=`${c.company||'No Company'} – ${c.full_name||c.email}`;
        clientSelect.appendChild(opt);
    });
}

function autofillClient(){
    const cid=clientSelect.value;
    const client=allClientProfiles.find(c=>c.user_id===cid);
    if(client){
        selectedUserIdInput.value=client.user_id;
        clientEmailInput.value=client.email||'';
        clientAddressInput.value=client.address||'';
        clientPhoneInput.value=client.phone_number||'';
        if(newInvoiceRadio.checked) generateNextInvoiceNumber(client.user_id);
        else loadClientInvoices(client.user_id);
    } else {
        [selectedUserIdInput,clientEmailInput,clientAddressInput,clientPhoneInput].forEach(i=>i.value='');
    }
}

async function generateNextInvoiceNumber(user_id){
    const {data,error}=await supabaseClient.from('invoices').select('invoice_number').eq('user_id',user_id).order('id',{ascending:false}).limit(1);
    let next='NGT-2026-0001';
    if(data && data.length>0){
        const last=data[0].invoice_number;
        const num=parseInt(last.split('-')[2])||0;
        const newNum=(num+1).toString().padStart(4,'0');
        next=`NGT-2026-${newNum}`;
    }
    invoiceNumberInput.value=next;
}

async function loadClientInvoices(user_id){
    existingInvoiceContainer.style.display='block';
    const {data,error}=await supabaseClient.from('invoices').select('id,invoice_number').eq('user_id',user_id).order('id',{ascending:false});
    existingInvoiceSelect.innerHTML='<option value="">-- Select an invoice --</option>';
    data.forEach(inv=>{
        const opt=document.createElement('option');
        opt.value=inv.id;
        opt.textContent=inv.invoice_number;
        existingInvoiceSelect.appendChild(opt);
    });
}

async function loadInvoice(invoice_id){
    if(!invoice_id) return;
    const {data,error}=await supabaseClient.from('invoices').select('*').eq('id',invoice_id).single();
    if(error){showMessage(error.message,'error'); return;}
    currentInvoiceData=data;
    // Autofill form
    invoiceNumberInput.value=data.invoice_number;
    document.getElementById('invoiceDate').value=data.invoice_date;
    document.getElementById('issueDate').value=data.issue_date;
    document.getElementById('dueDate').value=data.due_date;
    document.getElementById('status').value=data.status;
    document.getElementById('paymentTerms').value=data.payment_terms;
    document.getElementById('purchaseOrder').value=data.purchase_order||'';
    document.getElementById('paymentInstructions').value=data.payment_instructions||'';
    document.getElementById('discountRate').value=data.discount_percentage||0;
    document.getElementById('vatRate').value=data.vat_percentage||15;
    lineItemsContainer.innerHTML='';
    // Load line items
    const {data:items}=await supabaseClient.from('invoice_items').select('*').eq('invoice_id',invoice_id);
    items.forEach(item=>addLineItem(item));
}

// ---------- Event Listeners ----------
clientSelect.addEventListener('change',autofillClient);
existingInvoiceSelect.addEventListener('change',()=>{loadInvoice(existingInvoiceSelect.value);});
[newInvoiceRadio,editInvoiceRadio].forEach(radio=>{
    radio.addEventListener('change',()=>{
        existingInvoiceContainer.style.display=radio.checked && radio.value==='edit' ? 'block' : 'none';
        autofillClient();
    });
});

// ---------- Form Submission ----------
invoiceForm.addEventListener('submit',async e=>{
    e.preventDefault();
    showMessage('Saving invoice...','info');
    try{
        const invoiceData={
            user_id:selectedUserIdInput.value,
            invoice_number:invoiceNumberInput.value,
            invoice_date:document.getElementById('invoiceDate').value,
            issue_date:document.getElementById('issueDate').value,
            due_date:document.getElementById('dueDate').value,
            status:document.getElementById('status').value,
            client_email:clientEmailInput.value,
            client_phone:clientPhoneInput.value,
            subtotal:parseFloat(document.getElementById('subtotal').value),
            discount_amount:parseFloat(document.getElementById('discountAmount').value),
            vat_percentage:parseFloat(document.getElementById('vatRate').value),
            vat_amount:parseFloat(document.getElementById('vatAmount').value),
            total_amount_due:parseFloat(document.getElementById('totalAmountDue').value),
            payment_terms:document.getElementById('paymentTerms').value,
            purchase_order:document.getElementById('purchaseOrder').value||null,
            payment_instructions:document.getElementById('paymentInstructions').value,
            currency:'ZAR'
        };

        const lineItemsData=Array.from(document.querySelectorAll('.line-item-section')).map(sec=>{
            const id=sec.dataset.itemId;
            return{
                invoice_id:currentInvoiceData?.id||null,
                description:document.getElementById(`itemDescription_${id}`).value,
                quantity:parseFloat(document.getElementById(`itemQty_${id}`).value),
                rate:parseFloat(document.getElementById(`itemRate_${id}`).value),
                amount:parseFloat(document.getElementById(`itemAmount_${id}`).value)
            };
        });

        if(editInvoiceRadio.checked && currentInvoiceData?.id){
            await supabaseClient.from('invoices').update(invoiceData).eq('id',currentInvoiceData.id);
            await supabaseClient.from('invoice_items').delete().eq('invoice_id',currentInvoiceData.id);
        }

        const {error:itemErr}=await supabaseClient.from('invoice_items').insert(lineItemsData.map(li=>({...li,invoice_id:currentInvoiceData?.id||null})));
        if(itemErr) throw new Error(itemErr.message);

        showMessage('Invoice saved successfully!','success');
        invoiceForm.reset();
        lineItemsContainer.innerHTML='';
        addLineItem();
        autofillClient();

    } catch(err){
        console.error(err);
        showMessage(err.message,'error');
    }
});

// ---------- Initialize ----------
document.addEventListener('DOMContentLoaded',async()=>{
    const {data:clients}=await fetchClients();
    populateClients(clients);
    addLineItem();
});
</script>
</body>
</html>
