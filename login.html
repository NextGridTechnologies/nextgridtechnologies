<!-- Adjusted margin-top for the login section to account for the header -->
<section id="login" class="contact-wrapper" style="max-width:420px;margin:30px auto;text-align:center; padding-top: 20px;">
  <h2>Client Login</h2>
  <p class="contact-subtext">Access your account</p>

  <form id="loginForm" class="contact-form">
    <input type="email" id="email" placeholder="Business Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <!-- Forgot Password Link -->
    <div class="form-actions">
      <a href="#" id="forgotPasswordLink" class="forgot-password-link">Forgot password?</a>
    </div>

    <button type="submit" class="btn-primary">Sign In</button>
    <p id="message" class="message-text"></p> <!-- Now using the .message-text class -->

    <p style="margin-top:10px;font-size:14px;">
      Don’t have an account? <a href="index.html#contact">Request access</a>
    </p>
  </form>
</section>

<script src="js/supabase.min.js"></script>
<script>
const supabaseClient = supabase.createClient(
  'https://tirkqybcedxfusifslim.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8'
  { // <--- THIS IS THE IMPORTANT PART YOU NEED TO ADD
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: true
            }
    }
);

// --- Login Form Submission ---
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const msg = document.getElementById('message');

  msg.textContent = 'Signing in...';
  msg.className = 'message-text warning'; // Use class for initial styling

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if (error) {
    msg.textContent = error.message;
    msg.classList.remove('warning', 'success');
    msg.classList.add('error');
  } else {
    msg.textContent = 'Success! Redirecting…';
    msg.classList.remove('warning', 'error');
    msg.classList.add('success');
    window.location.href = 'client_dashboard.html'; // Ensure this is the correct post-login page
  }
});

// --- Forgot Password Link Click ---
document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
  e.preventDefault();
  const emailInput = document.getElementById('email');
  const email = emailInput.value;
  const msg = document.getElementById('message'); // Using the same message area

  // Clear any previous messages
  msg.textContent = '';
  msg.className = 'message-text'; // Reset classes

  if (!email) {
    msg.textContent = 'Please enter your email address in the field above.';
    msg.classList.add('warning');
    return;
  }

  msg.textContent = 'Sending password reset email...';
  msg.classList.add('warning');

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://nextgridtechnologies.co.za/reset-password.html', // <<< CHANGE THIS TO YOUR ACTUAL RESET PAGE URL
  });

  if (error) {
    msg.textContent = error.message;
    msg.classList.remove('warning', 'success');
    msg.classList.add('error');
  } else {
    msg.textContent = 'Password reset email sent! Check your inbox.';
    msg.classList.remove('warning', 'error');
    msg.classList.add('success');
    emailInput.value = ''; // Clear email field after sending
  }
});

// Hamburger menu (assuming this is present on your site-wide header)
const hamburger = document.getElementById("hamburger");
const navMenu = document.getElementById("navMenu");
if (hamburger && navMenu) {
  hamburger.addEventListener("click", () => {
    navMenu.classList.toggle("active");
  });
}
</script>
</body>
</html>
