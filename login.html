<section id="login" class="contact-wrapper" style="max-width:420px;margin:30px auto;text-align:center; padding-top: 20px;">

    <p style="margin-top:10px;font-size:14px;">
      Don’t have an account? <a href="index.html#contact">Request access</a>

    </p>

<!-- Updated script tag for local Supabase library -->
<script src="js/supabase.min.js"></script>
<script>
// Initialize Supabase Client
const supabaseClient = supabase.createClient(
    'https://tirkqybcedxfusifslim.supabase.co', // <-- REPLACE WITH YOUR SUPABASE URL
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8', // <-- REPLACE WITH YOUR SUPABASE ANON KEY
    { auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true } }
);

const messageDiv = document.getElementById('message');

function displayMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = `message-text ${type}`; // Using .message-text class
    // Optional: Hide message after a few seconds
    // setTimeout(() => {
    //     messageDiv.textContent = '';
    //     messageDiv.className = 'message-text';
    // }, 5000);
}

// --- Global Supabase Auth State Change Listener ---
// This is crucial for handling redirects reliably after sign-in, signup, etc.
supabaseClient.auth.onAuthStateChange(async (event, session) => {
    const loginLogoutLink = document.getElementById('loginLogoutLink');
    const adminLinkContainer = document.getElementById('adminLinkContainer');

    if (session && session.user) {
        // User is signed in. Check their role and redirect if on login page.
        loginLogoutLink.textContent = 'My Account';
        loginLogoutLink.href = 'account.html';

        // Fetch user's profile to get their role
        const { data: profileData, error: profileError } = await supabaseClient
            .from('profiles')
            .select('role')
            .eq('user_id', session.user.id) // Using 'user_id' as the column name based on your feedback
            .single();

        if (profileError) {
            console.error('Error fetching user role:', profileError.message);
            // Default to client dashboard if role fetch fails
        } else if (profileData && profileData.role === 'admin') {
            adminLinkContainer.innerHTML = '<a href="admin_dashboard.html">Admin Dashboard</a>';
            if (window.location.pathname.endsWith('login.html')) {
                window.location.href = 'admin_dashboard.html';
                return; // Stop further execution
            }
        }
        
        // If not admin or if admin link not needed, redirect client users if on login page
        if (window.location.pathname.endsWith('login.html')) {
            window.location.href = 'account.html';
            return; // Stop further execution
        }

    } else {
        // User is NOT signed in.
        loginLogoutLink.textContent = 'Client Login';
        loginLogoutLink.href = 'login.html';
        adminLinkContainer.innerHTML = ''; // Hide admin link
    }
});

// --- Login Form Submission ---
const loginForm = document.getElementById('loginForm');
if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        displayMessage('Signing in...', 'warning');

        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
            displayMessage(`Login failed: ${error.message}`, 'error');
            console.error('Login error:', error.message);
        } else if (data && data.user) {
            // Success! The onAuthStateChange listener will handle the redirect based on role.
            displayMessage('Signed in successfully! Redirecting…', 'success');
        } else {
            // This case is unlikely for email/password but good for completeness.
            displayMessage('Login attempt processed. If successful, you will be redirected.', 'warning');
        }
    });
}

// --- Forgot Password Link Click ---
document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
  e.preventDefault();
  const emailInput = document.getElementById('email');
  const email = emailInput.value;

  displayMessage('', ''); // Clear previous messages

  if (!email) {
    displayMessage('Please enter your email address in the field above.', 'warning');
    return;
  }

  displayMessage('Sending password reset email...', 'warning');

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    // !!! IMPORTANT: CHANGE THIS TO YOUR LIVE reset-password.html URL !!!
    redirectTo: 'https://nextgridtechnologies.co.za/reset-password.html', 
  });

  if (error) {
    displayMessage(error.message, 'error');
  } else {
    displayMessage('Password reset email sent! Check your inbox.', 'success');
    emailInput.value = ''; // Clear email field after sending
  }
});

// Hamburger menu functionality
document.addEventListener('DOMContentLoaded', () => {
    const hamburger = document.getElementById("hamburger");
    const navMenu = document.getElementById("navMenu");
    if (hamburger && navMenu) {
        hamburger.addEventListener("click", () => {
            navMenu.classList.toggle("active");
        });
    }
});
</script>
</body>
</html>
