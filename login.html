<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-C9DS2C71G6"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-C9DS2C71G6');

<title>NextGrid Technologies: Client Login / Sign Up</title>
<meta name="description" content="Securely log in or sign up for your NextGrid Technologies client account. Manage services, access support, and view your profile.">
<meta name="keywords" content="client login, secure login, IT support login, Microsoft 365 access, NextGrid Technologies, sign up, register">
<meta name="author" content="NextGrid Technologies">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"> <!-- Your main stylesheet -->
<style>
    .form-toggle-buttons {
        display: flex; justify-content: center; margin-bottom: 20px; gap: 10px;
    }
    .form-toggle-buttons button {
        background: var(--bg-dark-2); color: white; border: 1px solid var(--accent-2);
        padding: 8px 15px; border-radius: 6px; cursor: pointer; transition: all 0.3s ease;
    }
    .form-toggle-buttons button.active, .form-toggle-buttons button:hover {
        background: var(--accent-2); color: var(--bg-dark);
    }
    /* Simple styling for better spacing in the sign-up form */
    #signupForm input { margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div class="container header-flex">
    <div class="logo-area">
      <img src="favicon.ico" alt="NextGrid Technologies Logo" class="logo">
      <a href="index.html" class="logo-text">
        <span class="logo-line-1">NextGrid</span>
        <span class="logo-line-2">Technologies</span>
      </a>
    </div>

    <nav id="navMenu">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="blog.html">Blog</a>
      <!-- Placeholder for admin link - will be populated by JS if user is admin -->
      <div id="adminLinkContainer"></div>
      <!-- Login/Logout Link - ID for JS to target -->
      <!-- This will be "Client Login" or "Logout" based on auth status -->
      <a href="login.html" class="nav-cta" id="loginLogoutLink">Client Login</a>
    </nav>

    <div class="header-contact">
      <a href="tel:+27680330794" class="btn-phone">📞 Call</a>
      <a href="https://wa.me/27680330794" target="_blank" class="btn-whatsapp">💬 WhatsApp</a>
    </div>

    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">☰</button>
  </div>
</header>

<section id="auth-section" class="contact-wrapper" style="max-width:420px;margin:30px auto;text-align:center; padding-top: 20px;">
  <div class="form-toggle-buttons">
    <button id="showLoginBtn" class="active">Login</button>
    <button id="showSignupBtn">Sign Up</button>
  </div>

  <div id="loginContainer">
      <h2>Client Login</h2>
      <p class="contact-subtext">Access your account</p>
      <form id="loginForm" class="contact-form">
        <input type="email" id="email" placeholder="Business Email" required autocomplete="email">
        <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
        <div class="form-actions"><a href="#" id="forgotPasswordLink" class="forgot-password-link">Forgot password?</a></div>
        <button type="submit" class="btn-primary">Sign In</button>
        <p id="message" class="message-text"></p>
        <p style="margin-top:10px;font-size:14px;">Don’t have an account? <span id="switchToSignup" style="color:var(--accent-1); cursor:pointer;">Sign Up Here</span></p>
      </form>
  </div>

  <div id="signupContainer" style="display:none;">
      <h2>Client Sign Up</h2>
      <p class="contact-subtext">Create a new account</p>
      <form id="signupForm" class="contact-form">
        <input type="text" id="signupFullName" placeholder="Your Full Name" required autocomplete="name">
        <input type="text" id="signupCompany" placeholder="Business/Company Name (Optional)" autocomplete="organization">
        <input type="email" id="signupEmail" placeholder="Business Email" required autocomplete="email">
        <input type="tel" id="signupPhone" placeholder="Phone Number (Optional)" autocomplete="tel">
        <input type="password" id="signupPassword" placeholder="Create Password" required autocomplete="new-password">
        <button type="submit" class="btn-primary">Create Account</button>
        <p id="signupMessage" class="message-text"></p>
        <p style="margin-top:10px;font-size:14px;">Already have an account? <span id="switchToLogin" style="color:var(--accent-1); cursor:pointer;">Sign In Here</span></p>
      </form>
  </div>
</section>

<script src="js/supabase.min.js"></script>
<script>
// Initialize Supabase Client
const supabaseClient = supabase.createClient(
    'https://tirkqybcedxfusifslim.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8',
    { auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true } }
);

// --- Get DOM Elements ---
const messageDiv = document.getElementById('message');
const signupMessageDiv = document.getElementById('signupMessage');
const loginContainer = document.getElementById('loginContainer');
const signupContainer = document.getElementById('signupContainer');
const showLoginBtn = document.getElementById('showLoginBtn');
const showSignupBtn = document.getElementById('showSignupBtn');
const switchToSignupSpan = document.getElementById('switchToSignup');
const switchToLoginSpan = document.getElementById('switchToLogin');
const signupForm = document.getElementById('signupForm'); // Added for form reset

function displayMessage(divElement, text, type) {
    divElement.textContent = text;
    divElement.className = `message-text ${type}`;
}

// --- Global Auth State Listener (Handles redirects after successful login) ---
supabaseClient.auth.onAuthStateChange(async (event, session) => {
    if (session && session.user && window.location.pathname.includes('login.html')) {
        const { data: profile } = await supabaseClient.from('profiles').select('role').eq('user_id', session.user.id).single();
        window.location.href = (profile && profile.role === 'admin') ? 'admin_dashboard.html' : 'account.html';
    }
});

// --- Form Toggling Logic ---
function showLoginForm() {
    loginContainer.style.display = 'block'; signupContainer.style.display = 'none';
    showLoginBtn.classList.add('active'); showSignupBtn.classList.remove('active');
    document.title = "NextGrid Technologies: Client Login";
}
function showSignupForm() {
    loginContainer.style.display = 'none'; signupContainer.style.display = 'block';
    showLoginBtn.classList.remove('active'); showSignupBtn.classList.add('active');
    document.title = "NextGrid Technologies: Client Sign Up";
}
showLoginBtn.addEventListener('click', showLoginForm);
showSignupBtn.addEventListener('click', showSignupForm);
switchToSignupSpan.addEventListener('click', showSignupForm);
switchToLoginSpan.addEventListener('click', showLoginForm);

// --- Login Form Submission ---
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    displayMessage(messageDiv, 'Signing in...', 'warning');
    const { error } = await supabaseClient.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
    });
    if (error) displayMessage(messageDiv, `Login failed: ${error.message}`, 'error');
});

// --- Sign Up Form Submission (CORRECTED LOGIC) ---
signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    displayMessage(signupMessageDiv, 'Creating account...', 'warning');

    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const fullName = document.getElementById('signupFullName').value;
    const company = document.getElementById('signupCompany').value;
    const phone = document.getElementById('signupPhone').value;

    // Step 1: Create the secure authentication user.
    const { data: authData, error: authError } = await supabaseClient.auth.signUp({ email, password });

    if (authError) {
        displayMessage(signupMessageDiv, `Sign up failed: ${authError.message}`, 'error');
        return;
    }

    // Step 2: Insert the profile, even if verification is needed. authData contains the user's ID.
    // This will run immediately after Step 1 succeeds.
    const { error: profileError } = await supabaseClient
        .from('profiles')
        .insert({
            user_id: authData.user.id,
            full_name: fullName,
            company: company,
            phone_number: phone,
            email: email,
            role: 'client'
        });

    if (profileError) {
        displayMessage(signupMessageDiv, `Account created, but profile failed: ${profileError.message}. Please contact support.`, 'error');
    } else {
        // If both steps succeed, show the final success message.
        displayMessage(signupMessageDiv, 'Success! Please check your email to confirm your account, then you can log in.', 'success');
        signupForm.reset();
    }
});

// --- Forgot Password Link Click ---
document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  if (!email) { displayMessage(messageDiv, 'Please enter your email address first.', 'warning'); return; }

  displayMessage(messageDiv, 'Sending password reset email...', 'warning');
  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://nextgridtechnologies.co.za/reset-password.html',
  });
  if (error) { displayMessage(messageDiv, error.message, 'error'); } 
  else { displayMessage(messageDiv, 'Password reset email sent! Check your inbox.', 'success'); }
});

// Hamburger menu functionality
document.addEventListener('DOMContentLoaded', () => {
    const hamburger = document.getElementById("hamburger");
    if (hamburger) {
        hamburger.addEventListener("click", () => {
            document.getElementById("navMenu").classList.toggle("active");
        });
    }
});
</script>
</body>
</html>
