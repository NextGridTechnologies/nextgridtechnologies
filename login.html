
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-C9DS2C71G6"></script>

<!-- Refined Title Tag -->
<title>NextGrid Technologies: Client Login / Sign Up</title>

<!-- Refined Meta Description -->
<meta name="description" content="Securely log in or sign up for your NextGrid Technologies client account. Manage services, access support, and view your profile.">

<meta name="keywords" content="client login, secure login, IT support login, Microsoft 365 access, NextGrid Technologies, sign up, register">
<meta name="author" content="NextGrid Technologies">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"> <!-- Your main stylesheet -->
<style>
    /* Basic styling for toggling forms */
    .form-toggle-buttons {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
        gap: 10px;
    }
    .form-toggle-buttons button {
        background: var(--bg-dark-2);
        color: white;
        border: 1px solid var(--accent-2);
        padding: 8px 15px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    .form-toggle-buttons button.active,
    .form-toggle-buttons button:hover {
        background: var(--accent-2);
        color: var(--bg-dark);
    }
</style>
</head>
<body>

<!-- ====================HEADER========================== -->
<header>
  <div class="container header-flex">
    <div class="logo-area">
      <img src="favicon.ico" alt="NextGrid Technologies Logo" class="logo">
      <a href="index.html" class="logo-text">NextGrid Technologies</a>
    </div>

    <nav id="navMenu">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="blog.html">Blog</a>
      <div id="adminLinkContainer"></div>
      <a href="login.html" class="nav-cta" id="loginLogoutLink">Client Login</a>
    </nav>

    <div class="header-contact">
      <a href="tel:+27680330794" class="btn-phone">📞 Call</a>
      <a href="https://wa.me/27680330794" target="_blank" class="btn-whatsapp">💬 WhatsApp</a>
    </div>

    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">☰</button>
  </div>
</header>
<!-- ============================================== -->

<section id="auth-section" class="contact-wrapper" style="max-width:420px;margin:30px auto;text-align:center; padding-top: 20px;">
  <div class="form-toggle-buttons">
    <button id="showLoginBtn" class="active">Login</button>
    <button id="showSignupBtn">Sign Up</button>
  </div>

  <div id="loginContainer">
      <h2>Client Login</h2>
      <p class="contact-subtext">Access your account</p>
      <form id="loginForm" class="contact-form">
        <input type="email" id="email" placeholder="Business Email" required autocomplete="email">
        <input type="password" id="password" placeholder="Password" required autocomplete="current-password">

        <div class="form-actions">
          <a href="#" id="forgotPasswordLink" class="forgot-password-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary">Sign In</button>
        <p id="message" class="message-text"></p>
        <p style="margin-top:10px;font-size:14px;">
          Don’t have an account? <span id="switchToSignup">Sign Up Here</span>
        </p>
      </form>
  </div>

  <div id="signupContainer" style="display:none;">
      <h2>Client Sign Up</h2>
      <p class="contact-subtext">Create a new account</p>
      <form id="signupForm" class="contact-form">
        <input type="email" id="signupEmail" placeholder="Business Email" required autocomplete="email">
        <input type="password" id="signupPassword" placeholder="Create Password" required autocomplete="new-password">
        <!-- Optional: Add a confirmation password field -->
        <!-- <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required autocomplete="new-password"> -->

        <button type="submit" class="btn-primary">Sign Up</button>
        <p id="signupMessage" class="message-text"></p>
        <p style="margin-top:10px;font-size:14px;">
          Already have an account? <span id="switchToLogin">Sign In Here</span>
        </p>
      </form>
  </div>
</section>

<script src="js/supabase.min.js"></script>
<script>
// Initialize Supabase Client
const supabaseClient = supabase.createClient(
    'https://tirkqybcedxfusifslim.supabase.co', // <-- REPLACE WITH YOUR SUPABASE URL
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8', // <-- REPLACE WITH YOUR SUPABASE ANON KEY
    { auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true } }
);

const messageDiv = document.getElementById('message'); // For login form
const signupMessageDiv = document.getElementById('signupMessage'); // For signup form

function displayMessage(divElement, text, type) {
    divElement.textContent = text;
    divElement.className = `message-text ${type}`;
}

// --- Global Supabase Auth State Change Listener ---
supabaseClient.auth.onAuthStateChange(async (event, session) => {
    const loginLogoutLink = document.getElementById('loginLogoutLink');
    const adminLinkContainer = document.getElementById('adminLinkContainer');

    // This part handles what happens when a user is logged in
    if (session && session.user) {
        // Fetch the user's profile to determine their role
        const { data: profileData, error: profileError } = await supabaseClient
            .from('profiles')
            .select('role')
            .eq('user_id', session.user.id)
            .single();

        console.log('--- Login Redirect Check ---');
        console.log('User authenticated:', session.user.email);
        console.log('Profile data fetched:', profileData);
        console.log('Profile fetch error:', profileError);

        // First, set up the nav links based on login status
        loginLogoutLink.textContent = 'My Account';
        loginLogoutLink.href = 'account.html'; // Default for clients

        // Check if the user is an admin
        if (profileData && profileData.role === 'admin') {
            console.log("User is an ADMIN. Setting up admin links.");
            adminLinkContainer.innerHTML = '<a href="admin_dashboard.html" class="nav-cta">Admin Panel</a>';
            
            // If they are on the login page, redirect them to the admin dashboard
            if (window.location.pathname.endsWith('login.html')) {
                console.log("Redirecting admin to admin_dashboard.html...");
                window.location.href = 'admin_dashboard.html';
                return; // Stop further execution
            }
        } 
        // This 'else' block runs for non-admins (clients)
        else {
            console.log("User is a CLIENT or role not found. Setting up client view.");
            adminLinkContainer.innerHTML = ''; // Ensure admin link is not visible
            
            // If a non-admin is on the login page, redirect them to their account page
            if (window.location.pathname.endsWith('login.html')) {
                console.log("Redirecting client to account.html...");
                window.location.href = 'account.html';
                return; // Stop further execution
            }
        }
    } 
    // This 'else' handles the logged-out state
    else {
        loginLogoutLink.textContent = 'Client Login';
        loginLogoutLink.href = 'login.html';
        adminLinkContainer.innerHTML = '';
    }
});

// --- Form Toggling Logic ---
const loginContainer = document.getElementById('loginContainer');
const signupContainer = document.getElementById('signupContainer');
const showLoginBtn = document.getElementById('showLoginBtn');
const showSignupBtn = document.getElementById('showSignupBtn');
const switchToSignupSpan = document.getElementById('switchToSignup');
const switchToLoginSpan = document.getElementById('switchToLogin');

function showLoginForm() {
    loginContainer.style.display = 'block';
    signupContainer.style.display = 'none';
    showLoginBtn.classList.add('active');
    showSignupBtn.classList.remove('active');
    document.title = "NextGrid Technologies: Client Login"; // Update title
}

function showSignupForm() {
    loginContainer.style.display = 'none';
    signupContainer.style.display = 'block';
    showLoginBtn.classList.remove('active');
    showSignupBtn.classList.add('active');
    document.title = "NextGrid Technologies: Client Sign Up"; // Update title
}

showLoginBtn.addEventListener('click', showLoginForm);
showSignupBtn.addEventListener('click', showSignupForm);
switchToSignupSpan.addEventListener('click', showSignupForm);
switchToLoginSpan.addEventListener('click', showLoginForm);

// --- Login Form Submission ---
const loginForm = document.getElementById('loginForm');
if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        displayMessage(messageDiv, 'Signing in...', 'warning');

        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
            displayMessage(messageDiv, `Login failed: ${error.message}`, 'error');
            console.error('Login error:', error.message);
        } 
        // A successful login will trigger the onAuthStateChange listener,
        // which handles the success message and redirect. No need to add more here.
    });
}

// --- Sign Up Form Submission ---
const signupForm = document.getElementById('signupForm');
if (signupForm) {
    signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        
        displayMessage(signupMessageDiv, 'Creating account...', 'warning');

        const { data, error } = await supabaseClient.auth.signUp({
            email: email,
            password: password,
        });

        if (error) {
            displayMessage(signupMessageDiv, `Sign up failed: ${error.message}`, 'error');
            console.error('Sign up error:', error.message);
        } else {
            displayMessage(signupMessageDiv, 'Account created! Please check your email to confirm.', 'success');
            signupForm.reset();
        }
    });
}

// --- Forgot Password Link Click ---
document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
  e.preventDefault();
  const emailInput = document.getElementById('email');
  const email = emailInput.value;

  displayMessage(messageDiv, '', ''); // Clear previous messages

  if (!email) {
    displayMessage(messageDiv, 'Please enter your email address.', 'warning');
    return;
  }

  displayMessage(messageDiv, 'Sending password reset email...', 'warning');

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://nextgridtechnologies.co.za/reset-password.html',
  });

  if (error) {
    displayMessage(messageDiv, error.message, 'error');
  } else {
    displayMessage(messageDiv, 'Password reset email sent! Check your inbox.', 'success');
    emailInput.value = '';
  }
});

// Hamburger menu functionality
document.addEventListener('DOMContentLoaded', () => {
    const hamburger = document.getElementById("hamburger");
    const navMenu = document.getElementById("navMenu");
    if (hamburger && navMenu) {
        hamburger.addEventListener("click", () => {
            navMenu.classList.toggle("active");
        });
    }
});
</script>
</body>
</html>
