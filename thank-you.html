<style>
.thank-you-section {

}

  align-items: center;
  justify-content: center;

}

<body>
<div id="header"></div>

<section class="thank-you-section">
  <div class="container">
    <div class="check-icon">✓</div>
    <h1 id="mainHeading">Request Received</h1>
    <p class="subhead" id="subHeading">Thanks for reaching out. We've got your details and will contact you within 1 business hour.</p>
    
    <div class="hero-buttons">
      <a id="whatsappBtn" href="https://wa.me/27680330794?text=Hi NextGrid, I just submitted the contact form. My issue is urgent." class="btn-primary btn-large" onclick="gtag('event', 'click', {'event_category': 'WhatsApp', 'event_label': 'Thank You Page'});">Need it faster? WhatsApp Us</a>

    <div class="next-steps">

      <span id="footerNote">Not urgent? Feel free to close this page. We'll be in touch soon.</span><br>

</section>

<footer>
  <div class="container">
    <p>| © 2026 NextGrid Technologies |</p>
  </div>
</footer>

<script>
// Content swapper for R950 vs General
document.addEventListener('DOMContentLoaded', () => {
  const isR950 = new URLSearchParams(window.location.search).get('src') === 'r950';
  
  const mainHeading = document.getElementById('mainHeading');
  const subHeading = document.getElementById('subHeading');
  const whatsappBtn = document.getElementById('whatsappBtn');
  const stepsContainer = document.getElementById('stepsContainer');
  const footerNote = document.getElementById('footerNote');
  const backLink = document.getElementById('backLink');
  
  if (isR950) {
    // R950 specific content
    mainHeading.textContent = 'R950 Check Booked';
    subHeading.textContent = 'Thanks. We\'ve got your details. Richard will WhatsApp you within 1 business hour to confirm your 90-min slot and payment.';
    whatsappBtn.href = 'https://wa.me/27680330794?text=Hi Richard, I just booked the R950 Health Check. When can we do the 90-min slot?';
    whatsappBtn.textContent = 'Message Richard Now';
    backLink.href = 'r950-check.html';
    backLink.textContent = '← Back to R950 Details';
    footerNote.textContent = 'Questions before we contact you? WhatsApp us above.';
    
    stepsContainer.innerHTML = `
      <div class="step-item">
        <div class="step-number">1</div>
        <div class="step-text">
          <strong>We confirm your slot</strong>
          <p>Richard will WhatsApp you with available 90-min slots this week. Pick one. Usually same-day or next-day.</p>
        </div>
      </div>
      <div class="step-item">
        <div class="step-number">2</div>
        <div class="step-text">
          <strong>You pay R950</strong>
          <p>EFT or card link. Once paid, we send the calendar invite + prep checklist for your 23-point audit.</p>
        </div>
      <div class="step-item">
        <div class="step-number">3</div>
        <div class="step-text">
          <strong>We run the audit live</strong>
          <p>90 minutes on screen-share. You watch all 23 checks. Report delivered same day with Red/Amber/Green scores.</p>
        </div>
      </div>
    `;
  } else {
    // General contact form content
    stepsContainer.innerHTML = `
      <div class="step-item">
        <div class="step-number">1</div>
        <div class="step-text">
          <strong>We review your request</strong>
          <p>A technician checks your issue details and preps for the call. Usually takes 5-10 mins.</p>
        </div>
      </div>
      <div class="step-item">
        <div class="step-number">2</div>
        <div class="step-text">
          <strong>We call or WhatsApp you</strong>
          <p>Within 1 business hour 8am-5pm Mon-Fri. We’ll diagnose on the call and book a fix slot if needed.</p>
        </div>
      </div>
      <div class="step-item">
        <div class="step-number">3</div>
        <div class="step-text">
          <strong>Problem solved</strong>
          <p>Most issues fixed remotely same-day. On-site in Pretoria/Centurion next business day if needed.</p>
        </div>
      </div>
    `;
  }
});

// Load header
fetch('header.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('header').innerHTML = data;
    document.getElementById('hamburger')?.addEventListener('click', () => {
      document.getElementById('navMenu')?.classList.toggle('active');
    });
  });
</script>
</body>
</html>
